function createNewSubTable(parentTable) {
    const name = document.getElementById('newSubName').value.trim();
    if (!name) return;

    const isCd = parentTable.startsWith('CD_');
    let subName;
    if (isCd) {
        const prefix = parentTable.replace('CD_','').substring(0,4).toUpperCase();
        subName = 'CD_' + prefix + '_' + name.toUpperCase().replace(/\s+/g,'_');
    } else {
        const prefix = parentTable.replace('SYS_','');
        subName = (parentTable.startsWith('SYS_') ? 'SYS_' : '') + prefix + '_' + name.toUpperCase().replace(/\s+/g,'_');
    }

    // Sub-tables will be auto-detected after schema reload for both CD and user
    // No need to manually track them anymore

    // Update sub count
    const tableArr = isCd ? getCdTables() : getDbTables();
    const tbl = tableArr.find(t => t.name === parentTable);
    if (tbl) tbl.cols[1] = subMap[parentTable].length;

    document.getElementById('newSubOverlay').remove();
    renderContent();
    setTimeout(() => showTablePopup(subName), 100);
}

// ============================================================================
// TYPES EDITOR — uses cd_types (unique records) + cd_type_type (hierarchy links)
// ============================================================================

var _teState = {
    tableName: '',
    types: [],    // cd_types records
    links: [],    // CURRENT cd_type_type rows (mutated by drag)
    originalLinks: [], // ORIGINAL links from DB (never mutated)
    k_table: null,
    selectedId: null
};
var _teDragKey = null;
var _teDropZone = null;
var _teDropTargetKey = null;

function openTypesEditor(tableName) {
    _teState.tableName = tableName;
    fetch(API + '/entity-types/' + encodeURIComponent(tableName))
    .then(function(r) { return r.ok ? r.json() : { types: [], links: [], k_table: null }; })
    .then(function(data) {
        _teState.types = data.types || [];
        _teState.links = data.links || [];
        _teState.originalLinks = JSON.parse(JSON.stringify(data.links || []));
        _teState.k_table = data.k_table;
        _teState.selectedId = null;
        renderTypesEditor();
    })
    .catch(function() {
        _teState.types = [];
        _teState.links = [];
        _teState.k_table = null;
        renderTypesEditor();
    });
}

function _teGetType(id) {
    for (var i = 0; i < _teState.types.length; i++) {
        if (_teState.types[i].k_type === id) return _teState.types[i];
    }
    return null;
}

function renderTypesEditor() {
    var st = _teState;
    var treeHtml = '<div class="te-tree-item default-type">-</div>';

    // Render tree following the query logic:
    // L1 = roots (isroot=true), L2 = children via links
    // If child.isroot=true, do NOT expand its subtree (shown under its own root entry)
    function addChildren(parentId, depth) {
        if (depth > 10) return; // safety limit
        for (var i = 0; i < st.links.length; i++) {
            var lnk = st.links[i];
            if (lnk.k_type1 !== parentId) continue;
            var childType = _teGetType(lnk.k_type2);
            if (!childType) continue;

            var nodeKey = lnk.k_type2 + ':' + lnk.k_type1;
            var indent = depth * 24;
            treeHtml += '<div class="te-tree-item" draggable="true"' +
                ' data-key="' + nodeKey + '" data-id="' + lnk.k_type2 + '" data-parent="' + lnk.k_type1 + '"' +
                ' style="margin-left:' + indent + 'px;">' +
                escHtml(childType.name || 'Unnamed') + '</div>';

            // Expand subtree only if: child is NOT a root AND not a self-link
            if (!childType.isroot && lnk.k_type2 !== lnk.k_type1) {
                addChildren(lnk.k_type2, depth + 1);
            }
        }
    }

    // Render roots
    for (var i = 0; i < st.types.length; i++) {
        var t = st.types[i];
        if (!t.isroot) continue;
        var nodeKey = t.k_type + ':root';
        treeHtml += '<div class="te-tree-item" draggable="true"' +
            ' data-key="' + nodeKey + '" data-id="' + t.k_type + '" data-parent="root">' +
            escHtml(t.name || 'Unnamed') + '</div>';
        addChildren(t.k_type, 1);
    }

    var formHtml = '<div id="tePropsContent"></div>';

    var popup = document.getElementById('typesEditorPopup');
    popup.innerHTML = '<div class="popup te-popup">' +
        '<div class="te-title">Types of <strong>' + st.tableName + '</strong></div>' +
        '<div class="te-toolbar">' +
            '<button class="fe-btn" style="border:1px solid #D1D5DB;background:#fff;color:#334155;font-size:16px;padding:4px 10px;" onclick="teAddType()" title="Add new type">+</button>' +
            '<button class="fe-btn" style="border:1px solid #D1D5DB;background:#fff;color:#334155;padding:4px 10px;" onclick="teCloneType()" title="Clone selected type">&#9744;</button>' +
            '<button class="fe-btn fe-btn-ok" onclick="teSaveAll()">Save</button>' +
            '<button class="fe-btn fe-btn-cancel" onclick="closeTypesEditor()">Cancel</button>' +
        '</div>' +
        '<div class="te-body">' +
            '<div class="te-tree" id="teTreePanel">' +
                '<div class="te-tree-header">' +
                    '<input class="te-tree-filter" placeholder="\u2014" />' +
                    '<button class="te-tree-sort" title="Sort">&#8693;</button>' +
                '</div>' +
                treeHtml +
            '</div>' +
            '<div class="te-props">' +
                '<div class="te-tabs">' +
                    '<div class="te-tab active">General</div>' +
                    '<div class="te-tab">Status designer</div>' +
                    '<div class="te-tab">Business Roles</div>' +
                    '<div class="te-tab">Kinds</div>' +
                    '<div class="te-tab">Business Roles\'s Type Security</div>' +
                '</div>' +
                formHtml +
            '</div>' +
        '</div>' +
    '</div>';
    popup.classList.add('open');


    // Update props panel for current selection
    _teUpdateProps();
}

// TYPE EDITOR EVENTS — document-level delegation via IIFE (runs once, works after any re-render)
(function() {
    function tp() { return document.getElementById('teTreePanel'); }
    function items() { return document.querySelectorAll('.te-tree-item'); }
    function inTree(e) {
        var p = tp();
        if (!p) return false;
        var t = e.target;
        if (t.nodeType === 3) t = t.parentNode; // text node → parent element
        return p.contains(t);
    }
    function getItem(e) {
        var t = e.target;
        if (t.nodeType === 3) t = t.parentNode;
        var el = t.closest ? t.closest('.te-tree-item') : null;
        return (el && !el.classList.contains('default-type')) ? el : null;
    }

    document.addEventListener('click', function(e) {
        var el = getItem(e);
        if (!el || !inTree(e)) return;
        var id = parseInt(el.getAttribute('data-id'));
        if (!id) return;
        _teState.selectedId = id;
        var all = items();
        for (var j = 0; j < all.length; j++) all[j].classList.remove('active');
        // Highlight all instances of this k_type
        for (var j = 0; j < all.length; j++) {
            if (parseInt(all[j].getAttribute('data-id')) === id) all[j].classList.add('active');
        }
        _teUpdateProps();
    });

    document.addEventListener('dragstart', function(e) {
        var el = getItem(e);
        if (!el || !inTree(e)) return;
        _teDragKey = el.getAttribute('data-key');
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', _teDragKey);
        el.classList.add('dragging');
    });

    document.addEventListener('dragover', function(e) {
        if (!_teDragKey) return;
        var el = getItem(e);
        if (!el || !inTree(e)) return;
        var key = el.getAttribute('data-key');
        if (key === _teDragKey) return;
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        var all = items();
        for (var j = 0; j < all.length; j++) all[j].removeAttribute('data-zone');
        var rect = el.getBoundingClientRect();
        var rx = e.clientX - rect.left;
        var ry = e.clientY - rect.top;
        var zone;
        if (rx < rect.width * 0.25) zone = 'left';
        else if (rx > rect.width * 0.75) zone = 'right';
        else if (ry < rect.height * 0.5) zone = 'above';
        else zone = 'below';
        el.setAttribute('data-zone', zone);
        _teDropZone = zone;
        _teDropTargetKey = key;
    });

    document.addEventListener('dragleave', function(e) {
        var t = e.target;
        if (t.nodeType === 3) t = t.parentNode;
        var el = t.closest ? t.closest('.te-tree-item') : null;
        if (el) el.removeAttribute('data-zone');
    });

    document.addEventListener('drop', function(e) {
        if (!inTree(e)) return;
        e.preventDefault(); e.stopPropagation();
        var all = items();
        for (var j = 0; j < all.length; j++) { all[j].removeAttribute('data-zone'); all[j].classList.remove('dragging'); }
        if (!_teDragKey || !_teDropTargetKey || _teDragKey === _teDropTargetKey) { _teDragKey = null; return; }

        var dp = _teDragKey.split(':');
        var dragId = parseInt(dp[0]);
        var dragParent = dp[1] === 'root' ? null : parseInt(dp[1]);
        var tpp = _teDropTargetKey.split(':');
        var targetId = parseInt(tpp[0]);
        var targetParent = tpp[1] === 'root' ? null : parseInt(tpp[1]);
        var dragType = _teGetType(dragId);
        var targetType = _teGetType(targetId);
        var zone = _teDropZone || 'below';
        var st = _teState;
        if (!dragType || !targetType) { _teDragKey = null; return; }

        if (zone === 'right') {
            if (dragParent !== null) {
                for (var i = st.links.length - 1; i >= 0; i--) { if (st.links[i].k_type1 === dragParent && st.links[i].k_type2 === dragId) { st.links.splice(i, 1); break; } }
            } else { dragType.isroot = false; }
            st.links.push({ k_type1: targetId, k_type2: dragId, k_seq: null });
        } else if (zone === 'left') {
            if (dragParent !== null) {
                var gp = null;
                for (var i = 0; i < st.links.length; i++) { if (st.links[i].k_type2 === dragParent) { gp = st.links[i].k_type1; break; } }
                for (var i = st.links.length - 1; i >= 0; i--) { if (st.links[i].k_type1 === dragParent && st.links[i].k_type2 === dragId) { st.links.splice(i, 1); break; } }
                if (gp === null) { var pt = _teGetType(dragParent); if (pt && pt.isroot) dragType.isroot = true; }
                else { st.links.push({ k_type1: gp, k_type2: dragId, k_seq: null }); }
            }
        } else {
            if (dragParent !== null) {
                for (var i = st.links.length - 1; i >= 0; i--) { if (st.links[i].k_type1 === dragParent && st.links[i].k_type2 === dragId) { st.links.splice(i, 1); break; } }
            } else { dragType.isroot = false; }
            if (targetParent !== null) { st.links.push({ k_type1: targetParent, k_type2: dragId, k_seq: null }); }
            else {
                dragType.isroot = true;
                var di = st.types.indexOf(dragType); st.types.splice(di, 1);
                var ti = st.types.indexOf(targetType); if (zone === 'below') ti++;
                st.types.splice(ti, 0, dragType);
            }
        }
        _teDragKey = null; _teDropZone = null; _teDropTargetKey = null;
        renderTypesEditor();
    });

    document.addEventListener('dragend', function() {
        _teDragKey = null; _teDropZone = null; _teDropTargetKey = null;
        var all = items();
        for (var i = 0; i < all.length; i++) { all[i].removeAttribute('data-zone'); all[i].classList.remove('dragging'); }
    });
})();

function _teUpdateProps() {
    var container = document.getElementById('tePropsContent');
    if (!container) return;
    var sel = _teState.selectedId ? _teGetType(_teState.selectedId) : null;
    if (!sel) {
        container.innerHTML = '<div class="te-form"><div style="padding:20px;color:#94A3B8;font-style:italic;">Click a type to view properties</div></div>';

        '<div class="te-form-row"><div class="te-form-label">Type</div><div class="te-form-value"><select class="te-form-input"><option selected>Entity type</option></select></div></div>' +
        '<div class="te-form-row"><div class="te-form-label">Kind</div><div class="te-form-value"><select class="te-form-input"><option value="">—</option></select></div></div>' +

        '<div class="te-form-row"><div class="te-form-label">Description</div><div class="te-form-value"><textarea class="te-form-textarea" id="teDesc" onchange="teFieldChange(\'memo_plaintext\',this.value)">' + escHtml(sel.memo_plaintext || '') + '</textarea></div></div>' +
    '</div>';
}

function teFieldChange(field, value) {
    var sel = _teState.selectedId ? _teGetType(_teState.selectedId) : null;
    if (sel) sel[field] = value;
}

function teAddType() {
    var st = _teState;
    if (!st.k_table) return;
    fetch(API + '/tables/' + st.k_table + '/types', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: 'New Type' })
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
        if (data.k_type) {
            data.isroot = true;
            st.types.push(data);
            st.selectedId = data.k_type;
            renderTypesEditor();
        }
    })
    .catch(function(err) { alert('Error: ' + err.message); });
}

function teCloneType() {
    var st = _teState;
    if (!st.selectedId) { alert('Click a type first to select it'); return; }
    var sel = _teGetType(st.selectedId);
    if (!sel) return;
    
    // Clone = make this type also a root (if not already)
    // Or add a link from a different parent — for now, make it a root copy
    sel.isroot = true;
    renderTypesEditor();
}

function teSaveAll() {
    var st = _teState;

    // Build sets for comparison
    function linkKey(l) { return l.k_type1 + ':' + l.k_type2; }
    
    var originalSet = {};
    for (var i = 0; i < st.originalLinks.length; i++) {
        originalSet[linkKey(st.originalLinks[i])] = st.originalLinks[i];
    }
    
    var currentSet = {};
    for (var i = 0; i < st.links.length; i++) {
        currentSet[linkKey(st.links[i])] = st.links[i];
    }
    
    // Find links to DELETE (in original but not in current)
    var toDelete = [];
    for (var key in originalSet) {
        if (!currentSet[key]) toDelete.push(originalSet[key]);
    }
    
    // Find links to INSERT (in current but not in original)
    var toInsert = [];
    for (var key in currentSet) {
        if (!originalSet[key]) toInsert.push(currentSet[key]);
    }
    
    // Execute deletes
    var deletePromises = toDelete.map(function(l) {
        return fetch(API + '/type-links/' + l.k_type1 + '/' + l.k_type2, { method: 'DELETE' }).catch(function() {});
    });
    
    Promise.all(deletePromises).then(function() {
        // Execute inserts
        return Promise.all(toInsert.map(function(l, idx) {
            return fetch(API + '/type-links', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ parent_id: l.k_type1, child_id: l.k_type2, k_seq: idx + 1 })
            }).catch(function() {});
        }));
    }).then(function() {
        // Update isroot + name on changed types only
        return Promise.all(st.types.map(function(t) {
            if (typeof t.k_type !== 'number') return Promise.resolve();
            return fetch(API + '/types/' + t.k_type, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: t.name, isroot: t.isroot || false, flowfolder: t.flowfolder || false, memo_plaintext: t.memo_plaintext || null })
            }).catch(function() {});
        }));
    });
    
    closeTypesEditor();
}

function closeTypesEditor() {
    document.getElementById('typesEditorPopup').classList.remove('open');
}

        '<div class="qe-results" id="qeResults"></div>' +
    '</div>';

    // Focus textarea
    setTimeout(() => {
        const ta = document.getElementById('qeSql');
        if (ta) {
            ta.focus();
            ta.addEventListener('keydown', function(e) {
                // Ctrl+Enter to run
                if (e.ctrlKey && e.key === 'Enter') { e.preventDefault(); runQuery(); }
                // Tab to indent
                if (e.key === 'Tab') {
                    e.preventDefault();
                    const start = this.selectionStart;
                    this.value = this.value.substring(0, start) + '  ' + this.value.substring(this.selectionEnd);
                    this.selectionStart = this.selectionEnd = start + 2;
                }
            });
        }
    }, 100);
}

async function runQuery() {
    const ta = document.getElementById('qeSql');
    const status = document.getElementById('qeStatus');
    const results = document.getElementById('qeResults');
    if (!ta || !ta.value.trim()) return;
    
    status.textContent = 'Running...';
    status.style.color = '#64748B';
    results.innerHTML = '';
    
    try {
        const resp = await fetch(API + '/query', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ sql: ta.value.trim() })
        });
        const data = await resp.json();
        
        if (!resp.ok) {
            status.textContent = 'Error';
            status.style.color = '#DC2626';
            results.innerHTML = '<div class="qe-error">' + escHtml(data.error || 'Unknown error') + '</div>';
            return;
        }
        
        status.textContent = data.rowCount + ' rows — ' + data.elapsed + 'ms';
        status.style.color = '#16A34A';
        
        if (!data.rows || data.rows.length === 0) {
            results.innerHTML = '<div style="padding:12px;color:#94A3B8;font-style:italic;">No rows returned</div>';
            return;
        }
        
        // Build results table
        const cols = data.fields.map(f => f.name);
        let html = '<table><thead><tr>';
        for (const c of cols) html += '<th>' + escHtml(c) + '</th>';
        html += '</tr></thead><tbody>';
        
        for (const row of data.rows) {
            html += '<tr>';
            for (const c of cols) {
                const val = row[c];
                const display = val === null ? '<span style="color:#CBD5E1;">NULL</span>' : escHtml(String(val));
                html += '<td title="' + escAttr(String(val)) + '">' + display + '</td>';
            }
            html += '</tr>';
        }
        html += '</tbody></table>';
        results.innerHTML = html;
        
    } catch(e) {
        status.textContent = 'Error';
        status.style.color = '#DC2626';
        results.innerHTML = '<div class="qe-error">' + escHtml(e.message) + '</div>';
    }
}

function clearQuery() {
    const ta = document.getElementById('qeSql');
    const status = document.getElementById('qeStatus');
    const results = document.getElementById('qeResults');
    if (ta) ta.value = '';
    if (status) { status.textContent = 'Ready — SELECT queries only'; status.style.color = '#64748B'; }
    if (results) results.innerHTML = '';
}

function closeQueryEditor() {
    document.getElementById('queryEditorPopup').classList.remove('open');
}

function categorizeXsdTables() {
    const all = Object.keys(xsdFieldData);
    const cats = {
        cd: { entities: [], lookups: [], links: [], subtables: [] },
        sys: { entities: [], lookups: [], links: [], subtables: [] },
        user: { entities: [], lookups: [], links: [], subtables: [] },
    };
    
    for (const t of all) {
        let zone;
        if (t.startsWith('CD_')) zone = 'cd';
        else if (t.startsWith('SYS_')) zone = 'sys';
        else zone = 'user';
        
        const base = t.startsWith('CD_') ? t.replace('CD_','') : (t.startsWith('SYS_') ? t.replace('SYS_','') : t);
        
        if (t.startsWith('CD_LK_') || t.startsWith('SYS_LK_') || t.startsWith('LK_')) {
            cats[zone === 'user' ? 'user' : zone].lookups.push(t);
        } else if (base.includes('_') && base.split('_').length === 2 && base.split('_')[0].length <= 4) {
            // sub or link: check if prefix appears twice (self-ref link) or maps to entity
            const parts = base.split('_');
            if (parts[0] === parts[1].substring(0,parts[0].length)) {
                cats[zone].links.push(t);
            } else {
                // Check if second part is also a 4-letter entity prefix
                const secondIsEntity = all.some(e => {
                    const eBase = e.startsWith('CD_') ? e.replace('CD_','') : (e.startsWith('SYS_') ? e.replace('SYS_','') : e);
                    return !eBase.includes('_') && eBase.substring(0,4).toUpperCase() === parts[1].substring(0,4).toUpperCase() && e !== t;
                });
                if (secondIsEntity && parts[0].length <= 4 && parts[1].length <= 4) {
                    cats[zone].links.push(t);
                } else {
                    cats[zone].subtables.push(t);
                }
            }
        } else if (!base.includes('_')) {
            cats[zone].entities.push(t);
        } else {
            cats[zone].subtables.push(t);
        }
    }
    return cats;
}

function renderDbStatistics() {
    setTimeout(async () => {
        const container = document.getElementById('dbStatsContainer');
        if (!container) return;
        
        try {
            // Use cached schema if available, otherwise fetch
            let schema = window._schemaFull;
            if (!schema) {
                const cached = sessionStorage.getItem('ms_schema');
                if (cached) {
                    schema = JSON.parse(cached);
                } else {
                    const resp = await fetch(API + '/schema/full');
                    if (!resp.ok) throw new Error('HTTP ' + resp.status);
                    schema = await resp.json();
                    if (schema.error) throw new Error(schema.error);
                    sessionStorage.setItem('ms_schema', JSON.stringify(schema));
                }
                window._schemaFull = schema;
            }
            
            // Populate xsdFieldData for popups
            const typeMap = { 'integer':'i', 'bigint':'i', 'boolean':'b', 'text':'s',
                'character varying':'s', 'uuid':'u', 'bytea':'y',
                'timestamp with time zone':'d', 'timestamp without time zone':'d',
                'date':'d', 'numeric':'s', 'real':'s', 'double precision':'s' };
            xsdFieldData = {};
            for (const [tn, info] of Object.entries(schema)) {
                const upper = tn.toUpperCase();
                xsdFieldData[upper] = info.columns.map(c => c.name.toUpperCase() + ':' + (typeMap[c.type]||'s')).join(',');
                if (upper.startsWith('CD_LK_')) xsdFieldData[upper.replace('CD_','')] = xsdFieldData[upper];
            }
            
            // Categorize
            const cats = { cd:{entities:[],lookups:[],links:[],subtables:[]}, sys:{entities:[],lookups:[],links:[],subtables:[]}, user:{entities:[],lookups:[],links:[],subtables:[]} };
            for (const [tn, info] of Object.entries(schema)) {
                const t = tn.toUpperCase();
                let zone = t.startsWith('CD_') ? 'cd' : (t.startsWith('SYS_') ? 'sys' : 'user');
                const fields = info.columns.length;
                const count = info.count || 0;
                const base = t.replace(/^CD_|^SYS_/, '');
                const item = {name:t, fields, count};
                if (t.includes('$')) cats[zone].subtables.push(item);
                else if (t.includes('_LK_') || base.startsWith('LK_')) cats[zone].lookups.push(item);
                else if (base.split('_').length===2 && base.split('_')[0].length<=5 && base.split('_')[1].length<=5) cats[zone].links.push(item);
                else if (base.includes('_')) cats[zone].subtables.push(item);
                else cats[zone].entities.push(item);
            }
            
            function cardHtml(type, items, cardIcon, cardColor) {
                const sorted = [...items].sort((a,b) => a.name.localeCompare(b.name));
                let list = sorted.map(t =>
                    '<div class="ds-table-row" title="' + t.name + '">' +
                    '<span class="ds-table-name" style="color:' + cardColor + ';cursor:pointer;" onclick="alert(\'Klik op Records of Fields voor ' + t.name + '\')">' + t.name + '</span>' +
                    '<span class="ds-table-count" style="min-width:55px;text-align:right;cursor:pointer;color:#3B82F6;" onclick="showRawData(\x27' + t.name + '\x27)" title="Show records">' + t.count + '</span>' +
                    '<span class="ds-table-count" style="min-width:45px;text-align:right;padding-left:12px;border-left:1px solid #E2E8F0;cursor:pointer;color:#8B5CF6;" onclick="showTablePopup(\x27' + t.name + '\x27)" title="Show fields">' + t.fields + '</span></div>'
                ).join('');
                const totalRec = items.reduce((s,t) => s + t.count, 0);
                return '<div class="ds-card"><div class="ds-card-header"><span class="ds-card-title">' + type + '</span>' +
                    '<i data-lucide="' + cardIcon + '" style="width:18px;height:18px;color:' + cardColor + ';"></i></div>' +
                    '<div class="ds-card-number">' + items.length + '</div><div class="ds-card-sub">' + items.length + ' tabellen \u00b7 ' + totalRec.toLocaleString() + ' records</div>' +
                    '<div class="ds-card-divider"></div><div class="ds-table-header"><span>Tabel</span><span style="display:flex;gap:0;">' +
                    '<span style="min-width:55px;text-align:right;">Records</span>' +
                    '<span style="min-width:45px;text-align:right;padding-left:12px;border-left:1px solid #E2E8F0;">Fields</span></span></div>' +
                    '<div class="ds-card-list">' + list + '</div></div>';
            }
            
            function sectionHtml(zone, label, icon, color) {
                const c = cats[zone]; const all = [...c.entities,...c.lookups,...c.links,...c.subtables];
                const totalFields = all.reduce((s,t) => s + t.fields, 0);
                const totalRec = all.reduce((s,t) => s + t.count, 0);
                return '<div class="ds-section"><div class="ds-section-header">' +
                    '<i data-lucide="' + icon + '" style="width:20px;height:20px;color:' + color + ';"></i>' +
                    '<span class="ds-section-title">' + label + '</span>' +
                    '<span class="ds-section-count">\u2014 ' + all.length + ' tabellen, ' + totalFields + ' velden, ' + totalRec.toLocaleString() + ' records</span></div>' +
                    '<div class="ds-cards">' + cardHtml('Entities',c.entities,'table',color) +
                    cardHtml('Links',c.links,'link',color) + cardHtml('Subtables',c.subtables,'layers',color) +
                    cardHtml('Lookups',c.lookups,'list',color) + '</div></div>';
            }
            
            container.innerHTML =
                '<h1 style="font-size:24px;font-weight:600;color:#0F172A;margin-bottom:4px;">Database Statistieken</h1>' +
                '<p style="font-size:13px;color:#64748B;margin-bottom:24px;">Overzicht van tabellen en velden per categorie</p>' +
                sectionHtml('cd', 'Dictionary (CD_*)', 'book-open', '#3B82F6') +
                sectionHtml('sys', 'Systeem (SYS_*)', 'settings', '#F59E0B') +
                sectionHtml('user', 'User tabellen', 'users', '#22C55E');
            lucide.createIcons();
            
        } catch(e) {
            container.innerHTML = '<div style="padding:40px;color:#EF4444;">Error: ' + e.message + '<br><br><button onclick="renderContent()" style="padding:8px 16px;border-radius:6px;border:1px solid #3B82F6;background:#EFF6FF;color:#1D4ED8;cursor:pointer;">Retry</button></div>';
        }
    }, 10);
    
    return '<div id="dbStatsContainer" style="padding:20px;"><div style="text-align:center;padding:40px;"><div class="loading-spinner" style="width:32px;height:32px;margin:0 auto 12px;border-width:3px;"></div>Schema laden...</div></div>' +
        '<div class="popup-overlay" id="statsTablePopup"></div>';
}

function initDbStatistics() {
    // Click outside to close popup
    const pop = document.getElementById('statsTablePopup');
    if (pop) pop.addEventListener('click', function(e) {
        if (e.target === pop) pop.classList.remove('open');
    });

    // Load live record counts from API (Neon cloud database)
    fetch(API + '/stats/counts')
    .then(r => r.ok ? r.json() : null)
    .then(data => {
        if (!data) return;
        for (const [table, count] of Object.entries(data)) {
            const els = document.querySelectorAll(`[data-records="${table.toUpperCase()}"]`);
            els.forEach(el => {
                el.textContent = count.toLocaleString();
                el.style.color = count > 0 ? '#0F172A' : '#CBD5E1';
            });
        }
        updateSectionTotals();
    })
    .catch(() => { console.log('Could not load record counts from API'); });

    // Update card totals
    updateSectionTotals();
}

function updateSectionTotals() {
    const cards = document.querySelectorAll('.ds-card');
    cards.forEach(card => {
        const rows = card.querySelectorAll('[data-records]');
        let total = 0;
        rows.forEach(r => {
            const val = parseInt(r.textContent.replace(/\./g,'').replace(/,/g,'').replace(/—/g,'0'));
            if (!isNaN(val)) total += val;
        });
        const numEl = card.querySelector('.ds-card-number');
        if (numEl && total > 0) {
            numEl.textContent = total.toLocaleString();
        }
    });
}

function openStatsTable(tableName) {
    const raw = xsdFieldData[tableName.toUpperCase()] || xsdFieldData[tableName];
    if (!raw) return;
    
    const fields = raw.split(',').map(f => {
        const [name, typeCode] = f.split(':');
        const typeMap = {i:'integer',s:'varchar',b:'boolean',d:'timestamptz',u:'uuid',y:'bytea'};
        return { name, type: typeMap[typeCode] || typeCode };
    });

    const popup = document.getElementById('statsTablePopup');

    function renderMetaTab() {
        let rowsHtml = fields.map((f, idx) => {
            const typeColor = {integer:'#8B5CF6',varchar:'#0F172A',boolean:'#22C55E',timestamptz:'#0EA5E9',uuid:'#94A3B8',bytea:'#D97706'}[f.type] || '#64748B';
            const isKey = f.name.startsWith('K_');
            const isFk = f.name.startsWith('F_');
            let icon = '';
            if (isKey) icon = '<span style="color:#D97706;">&#128273;</span> ';
            else if (isFk) icon = '<span style="color:#2563EB;">&#128279;</span> ';
            return `<tr style="border-bottom:1px solid #F1F5F9;">
                <td style="padding:6px 12px;font-size:12px;color:#94A3B8;width:40px;">${idx}</td>
                <td style="padding:6px 12px;font-size:12px;font-weight:${isKey?700:400};color:#0F172A;">${icon}${f.name}</td>
                <td style="padding:6px 12px;font-size:12px;color:${typeColor};">${f.type}</td>
            </tr>`;
        }).join('');
        return `<table style="width:100%;border-collapse:collapse;">
            <thead><tr style="background:#F8FAFC;border-bottom:2px solid #E2E8F0;position:sticky;top:0;">
                <th style="padding:8px 12px;font-size:11px;font-weight:600;color:#64748B;text-align:left;text-transform:uppercase;">#</th>
                <th style="padding:8px 12px;font-size:11px;font-weight:600;color:#64748B;text-align:left;text-transform:uppercase;">Veld</th>
                <th style="padding:8px 12px;font-size:11px;font-weight:600;color:#64748B;text-align:left;text-transform:uppercase;">Type</th>
            </tr></thead>
            <tbody>${rowsHtml}</tbody>
        </table>`;
    }

    function renderDataTab() {
        const tableKey = tableName.toLowerCase();
        
        // Always try to load from API
        setTimeout(() => {
            console.log('Fetching data from:', API + '/raw/' + tableKey);
            fetch(API + '/raw/' + tableKey)
            .then(r => {
                console.log('Response status:', r.status, r.ok);
                if (!r.ok) throw new Error('HTTP ' + r.status);
                return r.json();
            })
            .then(data => {
                console.log('Data received:', data ? 'yes' : 'no', 'rows:', data?.rows?.length, 'total:', data?.total);
                const rows = data && data.rows ? data.rows : (Array.isArray(data) ? data : []);
                const total = data && data.total ? data.total : rows.length;
                const body = document.getElementById('statsDataBody');
                const countEl = document.getElementById('statsDataCount');
                if (!body) { console.log('statsDataBody not found!'); return; }
                
                if (rows.length > 0) {
                    const cols = Object.keys(rows[0]);
                    let html = '<table style="width:max-content;min-width:100%;border-collapse:collapse;">';
                    html += '<thead><tr>' + cols.map(c => 
                        '<th style="padding:8px 10px;font-size:10px;font-weight:600;color:#64748B;text-align:left;text-transform:uppercase;white-space:nowrap;border-bottom:2px solid #E2E8F0;background:#F8FAFC;position:sticky;top:0;">' + c + '</th>'
                    ).join('') + '</tr></thead><tbody>';
                    for (const row of rows) {
                        html += '<tr>';
                        for (const c of cols) {
                            let val = row[c];
                            if (val === null || val === undefined) val = '';
                            else if (typeof val === 'boolean') val = val ? '✓' : '';
                            else if (typeof val === 'object') val = '';
                            else if (typeof val === 'string' && val.length > 60) val = val.substring(0, 60) + '…';
                            html += '<td style="padding:6px 10px;font-size:12px;border-bottom:1px solid #F1F5F9;white-space:nowrap;">' + val + '</td>';
                        }
                        html += '</tr>';
                    }
                    html += '</tbody></table>';
                    body.innerHTML = html;
                    if (countEl) countEl.textContent = total + ' records, ' + cols.length + ' kolommen';
                } else {
                    body.innerHTML = '<div style="padding:20px;color:#94A3B8;font-style:italic;">Geen records</div>';
                    if (countEl) countEl.textContent = '0 records';
                }
            })
            .catch(() => {
                const body = document.getElementById('statsDataBody');
                if (body) body.innerHTML = '<div style="padding:20px;color:#94A3B8;font-style:italic;">Kan data niet laden</div>';
            });
        }, 100);

        return `<div style="overflow:auto;flex:1;" id="statsDataBody">
            <div style="padding:20px;color:#94A3B8;font-style:italic;">Laden...</div>
        </div>
        <div style="padding:8px 16px;border-top:1px solid #E2E8F0;font-size:11px;color:#94A3B8;" id="statsDataCount">${fields.length} kolommen</div>`;
    }

    function renderDataRows(colNames, rows) {
        const body = document.getElementById('statsDataBody');
        if (!body) return;
        const cols = typeof colNames[0] === 'string' ? colNames : colNames.map(c => c.name || c);
        let thead = cols.map(c =>
            `<th style="padding:8px 10px;font-size:10px;font-weight:600;color:#64748B;text-align:left;text-transform:uppercase;white-space:nowrap;border-bottom:2px solid #E2E8F0;background:#F8FAFC;position:sticky;top:0;">${c}</th>`
        ).join('');
        let tbody = rows.map(row => {
            const cells = Array.isArray(row) ? row : cols.map(c => row[c]);
            return '<tr style="border-bottom:1px solid #F1F5F9;">' + cells.map(v => {
                let val = v === null || v === undefined ? '—' : String(v);
                if (val.length > 40) val = val.substring(0,37) + '...';
                const color = v === null || v === undefined ? '#CBD5E1' : '#0F172A';
                return `<td style="padding:6px 10px;font-size:11px;color:${color};white-space:nowrap;font-family:monospace;">${escHtml(val)}</td>`;
            }).join('') + '</tr>';
        }).join('');
        body.innerHTML = `<table style="width:max-content;min-width:100%;border-collapse:collapse;">
            <thead><tr>${thead}</tr></thead>
            <tbody>${tbody}</tbody>
        </table>`;
        const countEl = document.getElementById('statsDataCount');
        if (countEl) countEl.textContent = rows.length + ' records (max 100 getoond) · ' + cols.length + ' kolommen';
    }
    
    // Render popup with tabs
    popup.innerHTML = `<div class="popup" style="width:90vw;max-width:1200px;max-height:85vh;">
        <div class="popup-header" style="flex-shrink:0;">
            <div>
                <span style="font-size:16px;font-weight:700;color:#0F172A;">${tableName}</span>
                <span style="font-size:12px;color:#94A3B8;margin-left:8px;">${fields.length} velden</span>
            </div>
            <button onclick="document.getElementById('statsTablePopup').classList.remove('open')" 
                style="border:none;background:none;cursor:pointer;font-size:20px;color:#94A3B8;">&#10005;</button>
        </div>
        <div style="display:flex;gap:0;border-bottom:1px solid #E2E8F0;padding:0 16px;background:#fff;flex-shrink:0;">
            <div class="stats-tab active" onclick="switchStatsTab(this,'meta')">Metadata</div>
            <div class="stats-tab" onclick="switchStatsTab(this,'data')">Data</div>
        </div>
        <div id="statsTabMeta" style="overflow-y:auto;flex:1;display:flex;flex-direction:column;">
            ${renderMetaTab()}
        </div>
        <div id="statsTabData" style="overflow:auto;flex:1;display:none;flex-direction:column;">
            ${renderDataTab()}
        </div>
    </div>`;
    popup.classList.add('open');
}

function switchStatsTab(el, tab) {
    const parent = el.parentElement;
    parent.querySelectorAll('.stats-tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('statsTabMeta').style.display = tab === 'meta' ? 'flex' : 'none';
    document.getElementById('statsTabData').style.display = tab === 'data' ? 'flex' : 'none';
}

function escHtml(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escAttr(s) { return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }
