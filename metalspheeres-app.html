// ============================================================================
// TYPES EDITOR
// ============================================================================
let typesEditorState = {
    tableName: '',
    types: [],       // { id, name, parentId, isCopy, children: [] }
    selectedId: null,
};

function openTypesEditor(tableName) {
    typesEditorState.tableName = tableName;

    // Try to load from API
    const tableId = tableMap[tableName];
    if (apiAvailable && tableId) {
        fetch(API + '/tables/' + tableId + '/types')
        .then(r => r.ok ? r.json() : [])
        .then(types => {
            typesEditorState.types = types;
            typesEditorState.selectedId = types.length > 0 ? types[0].k_types : null;
            renderTypesEditor();
        })
        .catch(() => {
            typesEditorState.types = [];
            typesEditorState.selectedId = null;
            renderTypesEditor();
        });
    } else {
        typesEditorState.types = [];
        typesEditorState.selectedId = null;
        renderTypesEditor();
    }
}

function renderTypesEditor() {
    const st = typesEditorState;
    const types = st.types;
    const sel = types.find(t => t.k_types === st.selectedId) || null;

    // Tree items
    let treeHtml = '<div class="te-tree-item default-type' + (!st.selectedId ? ' active' : '') + '" onclick="selectType(null)">—</div>';

    // Build hierarchy: root types first, then children
    const roots = types.filter(t => !t.f_parent);
    const children = types.filter(t => t.f_parent);

    for (const t of roots) {
        treeHtml += '<div class="te-tree-item' + (st.selectedId === t.k_types ? ' active' : '') + '" onclick="selectType(\'' + t.k_types + '\')">' + escHtml(t.name) + '</div>';
        // Find children
        for (const c of children.filter(ch => ch.f_parent === t.k_types)) {
            treeHtml += '<div class="te-tree-item child' + (st.selectedId === c.k_types ? ' active' : '') + '" onclick="selectType(\'' + c.k_types + '\')">' + escHtml(c.name) + '</div>';
        }
    }

    // General tab form
    let formHtml = '';
    if (sel) {
        formHtml = '<div class="te-form">' +
            '<div class="te-form-row"><div class="te-form-label">Name</div><div class="te-form-value"><input class="te-form-input" id="teName" value="' + escAttr(sel.name) + '"></div></div>' +
            '<div class="te-form-row"><div class="te-form-label">Type</div><div class="te-form-value"><select class="te-form-input" id="teType"><option selected>Entity type</option></select></div></div>' +
            '<div class="te-form-row"><div class="te-form-label">Kind</div><div class="te-form-value"><select class="te-form-input" id="teKind"><option value=""></option></select></div></div>' +
            '<div class="te-form-row"><div class="te-form-label">Icon</div><div class="te-form-value"><div class="te-icon-select">Select icon</div></div></div>' +
            '<div class="te-form-row"><div class="te-form-label">Flow folder</div><div class="te-form-value"><label class="te-form-check"><input type="checkbox" id="teFlowFolder" ' + (sel.flow_folder ? 'checked' : '') + '></label></div></div>' +
            '<div class="te-form-row"><div class="te-form-label">Status</div><div class="te-form-value"><select class="te-form-input" id="teStatus"><option>Enable</option><option>Disable</option></select></div></div>' +
            '<div class="te-form-row"><div class="te-form-label">Description</div><div class="te-form-value"><textarea class="te-form-textarea" id="teDesc">' + escHtml(sel.memo || '') + '</textarea></div></div>' +
        '</div>';
    } else {
        formHtml = '<div class="te-form"><div style="padding:20px;color:#94A3B8;font-style:italic;">Default type — no properties to edit</div></div>';
    }

    const popup = document.getElementById('typesEditorPopup');
    popup.innerHTML = '<div class="popup te-popup">' +
        '<div class="te-title">Types of <strong>' + st.tableName + '</strong></div>' +
        '<div class="te-toolbar">' +
            '<button class="fe-btn" style="border:1px solid #D1D5DB;background:#fff;color:#334155;font-size:16px;padding:4px 10px;" onclick="addType()" title="Add new type">+</button>' +
            '<button class="fe-btn" style="border:1px solid #D1D5DB;background:#fff;color:#334155;padding:4px 10px;" onclick="copyType()" title="Copy type">&#9744;</button>' +
            '<button class="fe-btn fe-btn-ok" onclick="saveType()">Save</button>' +
            '<button class="fe-btn fe-btn-cancel" onclick="closeTypesEditor()">Cancel</button>' +
        '</div>' +
        '<div class="te-body">' +
            '<div class="te-tree">' +
                '<div class="te-tree-header">' +
                    '<input class="te-tree-filter" placeholder="—" />' +
                    '<button class="te-tree-sort" title="Sort">&#8693;</button>' +
                '</div>' +
                treeHtml +
            '</div>' +
            '<div class="te-props">' +
                '<div class="te-tabs">' +
                    '<div class="te-tab active">General</div>' +
                    '<div class="te-tab">Status designer</div>' +
                    '<div class="te-tab">Business Roles</div>' +
                    '<div class="te-tab">Kinds</div>' +
                    '<div class="te-tab">Business Roles\'s Type Security</div>' +
                '</div>' +
                formHtml +
            '</div>' +
        '</div>' +
    '</div>';
    popup.classList.add('open');
}

function selectType(id) {
    typesEditorState.selectedId = id;
    renderTypesEditor();
}

function addType() {
    const st = typesEditorState;
    const tableId = tableMap[st.tableName];

    if (apiAvailable && tableId) {
        fetch(API + '/tables/' + tableId + '/types', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name: 'New Type' })
        })
        .then(r => r.json())
        .then(data => {
            if (data.k_types) {
                st.types.push(data);
                st.selectedId = data.k_types;
                renderTypesEditor();
            }
        })
        .catch(err => alert('Error: ' + err.message));
    } else {
        // In-memory
        const newType = { k_types: 'temp_' + Date.now(), name: 'New Type', memo: '', flow_folder: false, f_parent: null };
        st.types.push(newType);
        st.selectedId = newType.k_types;
        renderTypesEditor();
    }
}

function copyType() {
    // Copy makes an image in the tree, not a new record
    const st = typesEditorState;
    if (!st.selectedId) return;
    const sel = st.types.find(t => t.k_types === st.selectedId);
    if (!sel) return;
    alert('Copy creates a tree image reference of "' + sel.name + '" (not a new record). This feature will be connected to cd_type_type.');
}

function saveType() {
    const st = typesEditorState;
    if (!st.selectedId) { closeTypesEditor(); return; }

    const nameEl = document.getElementById('teName');
    const descEl = document.getElementById('teDesc');
    const flowEl = document.getElementById('teFlowFolder');
    if (!nameEl) { closeTypesEditor(); return; }

    const sel = st.types.find(t => t.k_types === st.selectedId);
    if (sel) {
        sel.name = nameEl.value;
        sel.memo = descEl ? descEl.value : '';
        sel.flow_folder = flowEl ? flowEl.checked : false;
    }

    // Save to API if available
    if (apiAvailable && sel && !sel.k_types.startsWith('temp_')) {
        fetch(API + '/types/' + sel.k_types, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name: sel.name, memo: sel.memo, flow_folder: sel.flow_folder })
        }).catch(() => {});
    }

    closeTypesEditor();
}

function closeTypesEditor() {
    document.getElementById('typesEditorPopup').classList.remove('open');
}

function escHtml(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escAttr(s) { return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }

// ============================================================================
// INIT
// ============================================================================
renderSidebar();
renderContent();
</script>
