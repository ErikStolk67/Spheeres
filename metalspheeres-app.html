async function showRawData(tableName) {
    const popup = document.createElement('div');
    popup.id = 'rawDataPopup';
    popup.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:9999;display:flex;align-items:center;justify-content:center;';
    popup.onclick = (e) => { if (e.target === popup) popup.remove(); };
    popup.innerHTML = '<div style="background:#fff;border-radius:12px;padding:24px;max-width:92vw;max-height:90vh;min-width:500px;display:flex;flex-direction:column;overflow:hidden;">' +
        '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">' +
        '<h3 style="margin:0;font-size:16px;" id="rawTitle">' + tableName + ' — Loading...</h3>' +
        '<button onclick="this.closest(\'#rawDataPopup\').remove()" style="border:none;background:none;font-size:20px;cursor:pointer;color:#64748B;">✕</button></div>' +
        '<div id="rawPager" style="margin-bottom:8px;display:flex;gap:6px;align-items:center;font-size:12px;flex-wrap:wrap;"></div>' +
        '<div id="rawDataContent" style="overflow:auto;flex:1;">Loading...</div></div>';
    document.body.appendChild(popup);
    window._rawTable = tableName;
    window._rawPage = 0;
    window._rawPageSize = 50;
    await loadRawPage();
}
async function loadRawPage() {
    const tableName = window._rawTable;
    const ps = window._rawPageSize;
    const offset = window._rawPage * ps;
    try {
        const res = await fetch(API + '/raw/' + encodeURIComponent(tableName.toLowerCase()) + '?limit=' + ps + '&offset=' + offset);
        if (!res.ok) throw new Error('API error ' + res.status);
        const data = await res.json();
        const rows = data.rows || data;
        const total = data.total || rows.length;
        const totalPages = Math.ceil(total / ps);
        const curPage = window._rawPage;
        document.getElementById('rawTitle').textContent = tableName + ' — ' + total + ' records';
        
        // Build pager with page numbers
        let p = '';
        if (totalPages > 1) {
            const btnStyle = 'padding:4px 8px;font-size:11px;cursor:pointer;border:1px solid #E2E8F0;border-radius:4px;background:#fff;';
            const activeStyle = 'padding:4px 8px;font-size:11px;cursor:default;border:1px solid #3B82F6;border-radius:4px;background:#3B82F6;color:#fff;font-weight:600;';
            const disStyle = 'padding:4px 8px;font-size:11px;border:1px solid #E2E8F0;border-radius:4px;background:#F8FAFC;color:#CBD5E1;cursor:default;';
            
            p += '<button onclick="window._rawPage=0;loadRawPage()" style="' + (curPage === 0 ? disStyle : btnStyle) + '" ' + (curPage === 0 ? 'disabled' : '') + '>◀◀</button>';
            p += '<button onclick="window._rawPage=Math.max(0,window._rawPage-1);loadRawPage()" style="' + (curPage === 0 ? disStyle : btnStyle) + '" ' + (curPage === 0 ? 'disabled' : '') + '>◀</button>';
            
            // Show page numbers: always show first, last, and nearby pages
            const pages = [];
            for (let i = 0; i < totalPages; i++) {
                if (i === 0 || i === totalPages - 1 || (i >= curPage - 2 && i <= curPage + 2)) {
                    pages.push(i);
                } else if (pages.length > 0 && pages[pages.length-1] !== -1) {
                    pages.push(-1); // ellipsis
                }
            }
            for (const pg of pages) {
                if (pg === -1) {
                    p += '<span style="font-size:11px;color:#94A3B8;">…</span>';
                } else {
                    p += '<button onclick="window._rawPage=' + pg + ';loadRawPage()" style="' + (pg === curPage ? activeStyle : btnStyle) + '">' + (pg + 1) + '</button>';
                }
            }
            
            p += '<button onclick="window._rawPage=Math.min(' + (totalPages-1) + ',window._rawPage+1);loadRawPage()" style="' + (curPage >= totalPages-1 ? disStyle : btnStyle) + '" ' + (curPage >= totalPages-1 ? 'disabled' : '') + '>▶</button>';
            p += '<button onclick="window._rawPage=' + (totalPages-1) + ';loadRawPage()" style="' + (curPage >= totalPages-1 ? disStyle : btnStyle) + '" ' + (curPage >= totalPages-1 ? 'disabled' : '') + '>▶▶</button>';
            p += '<span style="margin-left:8px;color:#94A3B8;font-size:11px;">' + (offset+1) + '–' + Math.min(offset+ps,total) + ' of ' + total + '</span>';
        }
        document.getElementById('rawPager').innerHTML = p;
        
        if (!rows.length) { document.getElementById('rawDataContent').innerHTML = '<em>No records</em>'; return; }
        const cols = Object.keys(rows[0]);
        let html = '<table style="border-collapse:collapse;font-size:11px;width:100%;"><thead><tr>';
        for (const c of cols) html += '<th style="border:1px solid #E2E8F0;padding:4px 8px;background:#F8FAFC;white-space:nowrap;text-align:left;position:sticky;top:0;">' + c + '</th>';
        html += '</tr></thead><tbody>';
        for (const row of rows) {
            html += '<tr>';
            for (const c of cols) {
                let v = row[c];
                if (v === null || v === undefined) v = '<span style="color:#CBD5E1;">NULL</span>';
                else if (typeof v === 'object') v = JSON.stringify(v).substring(0, 60);
                else v = String(v).substring(0, 100);
                html += '<td style="border:1px solid #E2E8F0;padding:3px 6px;max-width:250px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">' + v + '</td>';
            }
            html += '</tr>';
        }
        html += '</tbody></table>';
        document.getElementById('rawDataContent').innerHTML = html;
    } catch(e) {
        document.getElementById('rawDataContent').innerHTML = '<span style="color:#EF4444;">Error: ' + e.message + '</span>';
    }
}

function showTablePopup(tableName) {
    // Find in user tables, CD main tables, or recognize as sub/link/lookup table
    let table = getDbTables().find(t => t.name === tableName) || getCdTables().find(t => t.name === tableName);
    
    // If not found in main arrays, check if it's a known XSD table (sub, link, lookup)
    if (!table && xsdFieldData[tableName.toUpperCase()]) {
        const cdSubs = getCdSubTables();
        const isSub = Object.values(cdSubs).flat().includes(tableName);
        const isLk = tableName.startsWith('CD_LK_');
        table = { name: tableName, type: isSub ? 'sub' : (isLk ? 'lk' : 'cd'), icon: 'table' };
    }
    // Check user sub-tables
    const userSubs = getUserSubTables();
    if (!table && Object.values(userSubs).flat().includes(tableName)) {
        table = { name: tableName, type: 'sub', icon: 'table' };
    }
    if (!table) return;

    const isLookup = tableTypes[tableName] === 'lookup' || table.type === 'lk';
    const isCd = table.type === 'cd' || table.type === 'sub';
    const isLk = table.type === 'lk';
    const color = isCd ? '#3B82F6' : (isLk ? '#64748B' : (table.type === 'sys' ? '#F59E0B' : '#64748B'));
    const typeBadge = table.type === 'sub' ? 'Sub-table' : (isCd ? 'Dictionary' : (isLk ? 'Lookup' : (table.type === 'sys' ? 'System' : (isLookup ? 'Lookup' : 'Entity'))));

    // Try to find table ID for API lookup
    const tableId = tableMap[tableName] || tableMap[tableName.charAt(0).toUpperCase() + tableName.slice(1).toLowerCase()];

    function addCustomFields(fields) {
        // Append custom fields (group 'C') from in-memory store
        const cf = customFields[tableName] || [];
        for (const c of cf) {
            fields.push({
                name: c.name,
                group: 'C',
                type: c.type || 'varchar',
                pk: false,
                fk: c.name.startsWith('F_'),
                req: c.required || false,
                system: false,
                id: c.id || null,
            });
        }
        return fields;
    }

    if (apiAvailable && tableId) {
        loadFieldsFromDB(tableId).then(dbFields => {
            if (dbFields && dbFields.length > 0) {
                const fields = dbFields.map(f => ({
                    name: f.name,
                    group: f.field_group,
                    type: f.data_type + (f.max_length ? '(' + f.max_length + ')' : ''),
                    pk: f.is_primary_key,
                    fk: f.is_foreign_key,
                    req: f.is_required,
                    system: f.is_system,
                    id: f.k_field,
                }));
                renderPopup(tableName, typeBadge, color, addCustomFields(fields), null, tableId);
            } else {
                const fields = isLookup || isLk ? lookupFields(tableName) : entityFields(tableName);
                renderPopup(tableName, typeBadge, color, addCustomFields(fields), null, tableId);
            }
        });
    } else {
        const fields = isLookup || isLk ? lookupFields(tableName) : entityFields(tableName);
        renderPopup(tableName, typeBadge, color, addCustomFields(fields), null, null);
    }
}

function showLinkPopup(rowName, colName, relType) {
    // Derive link table name from row/col
    // CD_ tables: CD_CANVASES + CD_FUNCTIONS → CD_CANV_FUNC
    // SYS_ tables: SYS_USERS + SYS_ROLES → USER_ROLE
    const isCd = rowName.startsWith('CD_');
    let prefix1, prefix2, linkTableName;
    
    if (isCd) {
        prefix1 = rowName.replace('CD_','').substring(0, 4).toUpperCase();
        prefix2 = colName.replace('CD_','').substring(0, 4).toUpperCase();
        if (relType === 'nn') {
            // Self-referencing: CD_TYPE_TYPE, CD_FIEL_FIEL, etc.
            linkTableName = 'CD_' + prefix1 + '_' + prefix1;
        } else {
            linkTableName = 'CD_' + prefix1 + '_' + prefix2;
        }
    } else {
        prefix1 = rowName.replace('SYS_','').substring(0, 4).toUpperCase();
        prefix2 = colName.replace('SYS_','').substring(0, 4).toUpperCase();
        linkTableName = prefix1 + '_' + prefix2;
    }

    // Try XSD fields first
    let fields = parseXsdFields(linkTableName);
    let typeBadge;
    
    if (fields) {
        typeBadge = relType === 'nn' ? 'Link (N:N)' : 'Sub (1:N)';
    } else {
        // Fallback: generic link fields
        if (relType === 'nn') {
            const p = prefix1.toLowerCase();
            fields = [
                { name: 'K_' + p + '1', group: "H", type: "integer", pk: true, req: true },
                { name: 'K_' + p + '2', group: "H", type: "integer", pk: true, req: true },
                { name: "MAIN", group: "OH", type: "boolean" },
                { name: "MEMO", group: "OF", type: "bytea" },
                { name: "CREATEDBY", group: "F", type: "integer" },
                { name: "CREATEDATE", group: "F", type: "timestamptz" },
                { name: "CHANGEDBY", group: "F", type: "integer" },
                { name: "CHANGEDATE", group: "F", type: "timestamptz" },
            ];
            typeBadge = 'Link (N:N)';
        } else {
            const p1 = prefix1.toLowerCase();
            const p2 = prefix2.toLowerCase();
            fields = [
                { name: 'K_' + p1, group: "H", type: "integer", pk: true, fk: true, req: true },
                { name: 'K_' + p2, group: "H", type: "integer", pk: true, fk: true, req: true },
                { name: "MEMO", group: "OF", type: "bytea" },
                { name: "CREATEDBY", group: "F", type: "integer" },
                { name: "CREATEDATE", group: "F", type: "timestamptz" },
                { name: "CHANGEDBY", group: "F", type: "integer" },
                { name: "CHANGEDATE", group: "F", type: "timestamptz" },
            ];
            typeBadge = 'Sub (1:N)';
        }
    }

    const color = isCd ? '#3B82F6' : '#F59E0B';
    renderPopup(linkTableName, typeBadge, color, fields, { from: rowName, to: colName, type: relType });
}

function renderPopup(title, typeBadge, color, fields, linkInfo, tableId) {
    // Apply any saved group moves
    if (window._fieldGroupMoves) {
        for (const f of fields) {
            if (window._fieldGroupMoves[f.name]) {
                f.group = window._fieldGroupMoves[f.name];
            }
        }
    }

    // Group fields
    const groups = {};
    const groupOrder = ['H', 'OH', 'C', 'OF', 'F'];
    const groupNames = { H: 'Header', OH: 'OH', C: 'Custom', OF: 'OF', F: 'Footer' };
    for (const f of fields) {
        if (!groups[f.group]) groups[f.group] = [];
        groups[f.group].push(f);
    }

    // Type icon map
    function typeIcon(f) {
        if (f.pk) return '<span style="color:#D97706;">&#128273;</span>';
        if (f.fk || f.name.startsWith('f_') || f.name.startsWith('F_')) return '<span style="color:#2563EB;">&#128269;</span>';
        const dt = (f.type || '').replace(/\(.*\)/,'').toLowerCase();
        if (dt === 'varchar' || dt === 'text') return '<span style="color:#64748B;">T&#8593;</span>';
        if (dt === 'integer' || dt === 'numeric') return '<span style="color:#8B5CF6;">#</span>';
        if (dt === 'boolean') return '<span style="color:#22C55E;">&#9673;</span>';
        if (dt === 'date') return '<span style="color:#0EA5E9;">&#128197;</span>';
        if (dt === 'timestamptz') return '<span style="color:#0284C7;">&#128197;</span>';
        if (dt === 'uuid') return '<span style="color:#94A3B8;">&#9670;</span>';
        return '<span style="color:#94A3B8;">&#9679;</span>';
    }

    // Properties column: size + format
    function propsCol(f) {
        let parts = [];
        const dt = (f.type || '').toLowerCase();
        const sizeMatch = dt.match(/\((\d+)\)/);
        if (sizeMatch) parts.push('<span style="color:#94A3B8;">&#9776;</span> ' + sizeMatch[1]);
        return parts.join(' ') || '';
    }

    // Field flags icons
    function flagsCol(f) {
        let icons = [];
        if (f.pk) icons.push('<span title="Primary Key" style="color:#D97706;">&#128273;</span>');
        if (f.fk) icons.push('<span title="Foreign Key" style="color:#2563EB;">&#128279;</span>');
        if (f.req) icons.push('<span title="Required" style="color:#3B82F6;">&#9432;</span>');
        if (f.name.toLowerCase().includes('name') && !f.pk && !f.fk) icons.push('<span title="Search" style="color:#64748B;">&#128269;</span>');
        return icons.join(' ');
    }

    // Build rows per group - always show ALL 5 groups
    let rowsHtml = '';
    for (const g of groupOrder) {
        const gFields = groups[g] || [];

        if (gFields.length === 0) {
            // Empty group - show one reserved line as drop target
            rowsHtml += '<tr class="fl-field-row grp-' + g + '" data-group="' + g + '" ' +
                'ondragover="event.preventDefault();this.style.background=\'#E0F2FE\'" ' +
                'ondragleave="this.style.background=\'\'" ' +
                'ondrop="dropField(event,\'' + g + '\')">' +
                '<td class="fl-group-label glbl-' + g + '" rowspan="1"><span>' + groupNames[g] + '</span></td>' +
                '<td colspan="4" style="padding:8px 12px;color:#CBD5E1;font-style:italic;font-size:11px;min-height:28px;">' +
                (g === 'C' ? 'drag fields here' : '—') + '</td></tr>';
            continue;
        }

        for (let i = 0; i < gFields.length; i++) {
            const f = gFields[i];
            const clickAttr = 'onclick="openFieldEditor(\'' + title + '\',\'' + (tableId||'') + '\',\'' + f.name.replace(/'/g,"\\'") + '\',\'' + (f.group||g) + '\',\'' + (f.type||'').replace(/'/g,"\\'") + '\',' + (f.pk?'true':'false') + ',' + (f.fk?'true':'false') + ',' + (f.req?'true':'false') + ',' + (f.system !== false ? 'true' : 'false') + ')"';

            rowsHtml += '<tr class="fl-field-row grp-' + g + '" draggable="true" data-group="' + g + '" data-field="' + f.name + '" ' +
                'ondragstart="dragField(event,\'' + f.name + '\',\'' + g + '\')" ' +
                'ondragover="event.preventDefault();this.style.borderBottom=\'2px solid #3B82F6\'" ' +
                'ondragleave="this.style.borderBottom=\'\'" ' +
                'ondrop="dropField(event,\'' + g + '\',\'' + f.name + '\');this.style.borderBottom=\'\'" ' +
                clickAttr + '>';

            // Group label (only on first row of group)
            if (i === 0) {
                rowsHtml += '<td class="fl-group-label glbl-' + g + '" rowspan="' + gFields.length + '" ' +
                    'ondragover="event.preventDefault()" ' +
                    'ondrop="dropField(event,\'' + g + '\')">' +
                    '<span>' + groupNames[g] + '</span></td>';
            }

            // Toggle + type icon + field name
            let nameHtml = '<span class="fl-toggle" style="cursor:grab;">&#8942;&#8942;</span> ';
            nameHtml += typeIcon(f) + ' ';
            nameHtml += '<strong>' + f.name.toUpperCase() + '</strong>';
            if (f.fk && f.ref) {
                nameHtml += ' <span style="color:#2563EB;">&#8635;</span> <span style="color:#94A3B8;">' + f.ref + '.</span><strong>NAME</strong>';
            }
            rowsHtml += '<td class="fl-field-name">' + nameHtml + '</td>';

            // Properties
            rowsHtml += '<td class="fl-field-props">' + propsCol(f) + '</td>';

            // Flags
            rowsHtml += '<td class="fl-field-flags">' + flagsCol(f) + '</td>';

            // Settings hamburger
            rowsHtml += '<td class="fl-field-settings">&#9776;</td>';

            rowsHtml += '</tr>';
        }
    }

    // Link info bar
    let linkBar = '';
    if (linkInfo) {
        const typeLabel = linkInfo.type === 'nn' ? 'N : N' : linkInfo.type === 'n' ? '1 : N' : 'FK ref';
        linkBar = '<div class="link-info">' +
            '<span style="font-weight:600;color:#0F172A;">' + linkInfo.from + '</span>' +
            '<span class="link-info-arrow">&harr;</span>' +
            '<span style="font-weight:600;color:#0F172A;">' + linkInfo.to + '</span>' +
            '<span style="margin-left:auto;padding:2px 10px;border-radius:4px;font-size:11px;font-weight:600;background:' + color + '18;color:' + color + ';">' + typeLabel + '</span>' +
        '</div>';
    }

    const popup = document.getElementById('fieldPopup');
    const isDbTable = title.toLowerCase().startsWith('cd_');
    const dbBtns = isDbTable ? 
        '<button class="fe-btn" style="background:#10B981;color:#fff;" onclick="syncTableToDb(\'' + title + '\')">&#9729; Sync DB</button>' +
        '<button class="fe-btn" style="background:#8B5CF6;color:#fff;" onclick="openAddColumnPopup(\'' + title + '\')">+ Column</button>'
        : '';
    popup.innerHTML = '<div class="popup fl-popup">' +
        // Toolbar
        '<div class="fl-toolbar">' +
            '<button class="fe-btn fe-btn-ok" onclick="closePopup()">Ok</button>' +
            (tableId ? '<button class="fe-btn" style="background:#0EA5E9;color:#fff;" onclick="closePopup();openAddFieldPopup(\'' + title + '\',\'' + tableId + '\',\'' + typeBadge + '\',\'' + color + '\')">+ New</button>' : '') +
            dbBtns +
            '<button class="fe-btn fe-btn-cancel" onclick="closePopup()">Cancel</button>' +
            '<span class="fl-toolbar-search"><span style="color:#94A3B8;">&#128269;</span> Search...</span>' +
        '</div>' +
        // Header
        '<div class="fl-header">' +
            '<div class="fl-header-left">' +
                '<div class="fl-header-icon" style="background:' + color + '18;color:' + color + ';">' + title.substring(0,2) + '</div>' +
                '<div><span class="fl-header-title">' + title + '</span>' +
                '<span class="fl-header-sub">' + typeBadge + '</span></div>' +
                '<select class="fl-root-select"><option>Root</option></select>' +
            '</div>' +
            '<div class="fl-header-right">' +
                '<label style="font-size:12px;color:#64748B;display:flex;align-items:center;gap:4px;">&#9673; Disable</label>' +
                '<label style="font-size:12px;color:#64748B;display:flex;align-items:center;gap:4px;">&#9673; Merge view</label>' +
            '</div>' +
        '</div>' +
        linkBar +
        // Field list table
        '<div class="fl-table-wrap">' +
            '<table class="fl-table">' +
                '<thead><tr><th style="width:30px;"></th><th>Field Name</th><th style="width:180px;">Properties</th><th style="width:120px;">Field Flags</th><th style="width:40px;"></th></tr></thead>' +
                '<tbody>' + rowsHtml + '</tbody>' +
            '</table>' +
        '</div>' +
    '</div>';
    popup.classList.add('open');
}

// Drag-and-drop state
let dragState = { fieldName: null, fromGroup: null };

function dragField(event, fieldName, fromGroup) {
    dragState = { fieldName, fromGroup };
    event.dataTransfer.effectAllowed = 'move';
    event.dataTransfer.setData('text/plain', fieldName);
    // Semi-transparent drag effect
    event.target.style.opacity = '0.5';
    setTimeout(() => { event.target.style.opacity = ''; }, 0);
}

function dropField(event, toGroup, beforeField) {
    event.preventDefault();
    event.stopPropagation();
    if (!dragState.fieldName || dragState.fromGroup === toGroup) return;

    // Find the popup's current field data and move the field
    const popup = document.getElementById('fieldPopup');
    if (!popup) return;

    // Update the field's group in the current popup data
    const fieldName = dragState.fieldName;
    const rows = popup.querySelectorAll('tr[data-field]');
    let movedRow = null;
    rows.forEach(r => {
        if (r.getAttribute('data-field') === fieldName) movedRow = r;
    });

    if (movedRow) {
        // Visual feedback: flash the target group
        const targetRows = popup.querySelectorAll('tr[data-group="' + toGroup + '"]');
        targetRows.forEach(r => {
            r.style.transition = 'background 0.3s';
            r.style.background = '#DBEAFE';
            setTimeout(() => r.style.background = '', 500);
        });

        // Store the move for when we re-render
        if (!window._fieldGroupMoves) window._fieldGroupMoves = {};
        window._fieldGroupMoves[fieldName] = toGroup;

        // Re-render the popup with updated groups
        // Trigger a click on the table name to refresh
        const titleEl = popup.querySelector('.popup-header span') || popup.querySelector('.te-title strong');
        const tableName = titleEl ? titleEl.textContent : '';
        if (tableName) {
            setTimeout(() => showTablePopup(tableName), 50);
        }
    }

    dragState = { fieldName: null, fromGroup: null };
}

function openFieldEditor(tableName, tableId, fieldName, group, dataType, isPk, isFk, isReq, isSystem) {
    // Open the field editor popup pre-filled with existing field data
    addFieldContext = { tableName, tableId, typeBadge: '', color: '' };

    // Determine control type from dataType
    const dt = dataType.replace(/\(.*\)/,'').toLowerCase();
    let ctId = 'text';
    if (isFk || fieldName.startsWith('F_') || fieldName.startsWith('f_')) ctId = 'lookup';
    else if (dt === 'integer') ctId = 'integer';
    else if (dt === 'numeric') ctId = 'decimal';
    else if (dt === 'date') ctId = 'date';
    else if (dt === 'timestamptz' && !fieldName.toLowerCase().includes('date')) ctId = 'datetime';
    else if (dt === 'boolean') ctId = 'checkbox';
    else if (dt === 'varchar' || dt === 'text') ctId = 'text';

    openAddFieldPopup(tableName, tableId, '', '');

    // Pre-fill values after popup is rendered
    setTimeout(() => {
        const typeSelect = document.getElementById('feFieldType');
        if (typeSelect) {
            typeSelect.value = ctId;
            onFieldTypeChange();
        }
        const nameInput = document.getElementById('feName');
        if (nameInput) {
            let displayName = fieldName.toUpperCase();
            if (ctId === 'lookup' && displayName.startsWith('F_')) displayName = displayName.substring(2);
            nameInput.value = displayName;
        }
        const sizeInput = document.getElementById('feSize');
        if (sizeInput) {
            const sizeMatch = dataType.match(/\((\d+)\)/);
            if (sizeMatch) sizeInput.value = sizeMatch[1];
        }
        const reqCheck = document.getElementById('feFlgRequired');
        if (reqCheck) reqCheck.checked = isReq;
        const sysCheck = document.getElementById('feFlgSystem');
        if (sysCheck) sysCheck.checked = isSystem;
    }, 50);
}

function onFieldTypeChange() {
    const type = document.getElementById('feFieldType').value;
    const sizeWrap = document.getElementById('feSizeWrap');
    const sizeInput = document.getElementById('feSize');
    const prefix = document.getElementById('fePrefix');
    const formatSelect = document.getElementById('feFormat');
    const valType = document.getElementById('feValType');

    // Size: only for text and decimal
    if (type === 'text') {
        sizeWrap.style.display = ''; sizeInput.value = 80;
    } else if (type === 'decimal') {
        sizeWrap.style.display = ''; sizeInput.value = 16;
    } else {
        sizeWrap.style.display = 'none';
    }

    // Prefix F_ for lookups
    if (type === 'lookup') {
        prefix.style.display = '';
        document.getElementById('feName').style.borderRadius = '0 6px 6px 0';
    } else {
        prefix.style.display = 'none';
        document.getElementById('feName').style.borderRadius = '6px';
    }

    // Format options per type
    const formats = {
        text: ['None','Starts with capital','Lowercase','IP Address','Phone number','Uppercase','URL','Local URL','Mail','SKYPE','SQL','Linkedin'],
        integer: ['None','Currency','Percentage','Number'],
        decimal: ['None','Currency','Percentage','Number'],
        date: ['None','dd-mm-yyyy','mm-dd-yyyy','yyyy-mm-dd'],
        datetime: ['None','dd-mm-yyyy HH:mm','mm-dd-yyyy HH:mm','yyyy-mm-dd HH:mm'],
        checkbox: ['None'],
        lookup: ['None'],
    };
    const fmts = formats[type] || ['None'];
    formatSelect.innerHTML = fmts.map(f => '<option value="' + f + '">' + f + '</option>').join('');

    // Validate type label
    valType.value = type ? (type.charAt(0).toUpperCase() + type.slice(1)) : '';

function saveCustomField() {
    const tableId = addFieldContext.tableId;
    const tableName = addFieldContext.tableName;
    const type = document.getElementById('feFieldType').value;
    let name = document.getElementById('feName').value.trim().toUpperCase();

    if (!type || name.length < 2) {
        alert('Please select a Field Type and enter a Field Name.');
        return;
    }

    // Add F_ prefix for lookups
    if (type === 'lookup' && !name.startsWith('F_')) {
        name = 'F_' + name;
    }

    const ct = controlTypes.find(c => c.id === type);
    const sizeEl = document.getElementById('feSize');
    const size = (type === 'text' || type === 'decimal') ? parseInt(sizeEl.value) || null : null;
    const required = document.getElementById('feFlgRequired').checked;
    const lookupTable = type === 'lookup' ? document.getElementById('feValTable').value : null;

    if (apiAvailable && tableId) {
        fetch(API + '/tables/' + tableId + '/fields', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                name: name,
                data_type: ct.dataType,
                max_length: size,
                is_required: required,
                control_type: type,
                lookup_table: lookupTable,
            })
        })
        .then(r => r.json())
        .then(data => {
            if (data.error) { alert('Error: ' + data.error); return; }
            closeAddFieldPopup();
            showTablePopup(tableName);
        })
        .catch(err => alert('Error saving: ' + err.message));
    } else {
        // In-memory fallback
        if (!customFields[tableName]) customFields[tableName] = [];
        customFields[tableName].push({
            name: name,
            controlType: type,
            dataType: ct.dataType,
            type: ct.dataType + (size ? '(' + size + ')' : ''),
            required: required,
            maxLength: size,
        });
        closeAddFieldPopup();
        showTablePopup(tableName);
    }
}

async function syncTableToDb(tableName) {
    const table = tableName.toLowerCase();
    const fields = xsdFieldData[tableName.toUpperCase()] || xsdFieldData[tableName];
    if (!fields || fields.length === 0) {
        alert('No field definitions found for ' + tableName);
        return;
    }
    
    showLoading('Syncing ' + tableName + '...');
    
    // Check if table exists in DB
    try {
        const resp = await fetch(API + '/schema/tables/' + table + '/columns');
        const dbCols = await resp.json();
        const dbColNames = dbCols.map(c => c.column_name);
        
        // Find missing columns
        let added = 0;
        for (const f of fields) {
            const colName = f.toLowerCase();
            if (!dbColNames.includes(colName)) {
                // Determine type from XSD field name patterns
                let dtype = 'varchar(100)';
                if (colName.startsWith('k_')) dtype = 'integer';
                else if (colName.startsWith('f_')) dtype = 'integer';
                else if (colName === 'memo') dtype = 'bytea';
                else if (colName.includes('memo_plaintext')) dtype = 'varchar(500)';
                else if (colName === 'createdby' || colName === 'changedby') dtype = 'integer';
                else if (colName === 'createdate' || colName === 'changedate' || colName === 'laststatusdate' || colName === 'lifedate') dtype = 'timestamptz';
                else if (colName === 'replicationid') dtype = 'uuid';
                else if (colName === 'sort' || colName === 'k_seq' || colName === 'sort_order') dtype = 'integer';
                else if (colName.startsWith('is_') || colName === 'enabled' || colName === 'main' || colName === 'locked') dtype = 'boolean';
                else if (colName.includes('properties') || colName.includes('url') || colName.includes('code') || colName.includes('alias')) dtype = 'varchar(100)';
                else if (colName.includes('name')) dtype = 'varchar(100)';
                
                const addResp = await fetch(API + '/schema/tables/' + table + '/columns', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ column_name: colName, data_type: dtype })
                });
                if (addResp.ok) added++;
            }
        }
        
        // Reload column info
        const resp2 = await fetch(API + '/schema/tables/' + table + '/columns');
        const updatedCols = await resp2.json();
        
        alert('✓ Sync complete for ' + tableName + '\n\nColumns in DB: ' + updatedCols.length + '\nColumns added: ' + added);
        hideLoading();
        showTablePopup(tableName);
    } catch (err) {
        hideLoading();
        alert('Error syncing: ' + err.message);
    }
}

// Drag & drop import - works on any page
// Use window + capture to ensure we always catch the event
window.addEventListener('dragover', function(e) { e.preventDefault(); e.stopPropagation(); }, true);
window.addEventListener('dragenter', function(e) { e.preventDefault(); e.stopPropagation(); }, true);
window.addEventListener('drop', async function(e) {
    e.preventDefault();
    e.stopPropagation();
    
    // Collect all XML files from dropped items (files, folders, zips)
    var files = [];
    
    // Try DataTransferItemList for folder support
    if (e.dataTransfer.items && e.dataTransfer.items.length) {
        var entries = [];
        for (var i = 0; i < e.dataTransfer.items.length; i++) {
            var entry = e.dataTransfer.items[i].webkitGetAsEntry && e.dataTransfer.items[i].webkitGetAsEntry();
            if (entry) entries.push(entry);
        }
        
        async function readEntry(entry) {
            if (entry.isFile) {
                return new Promise(function(resolve) {
                    entry.file(function(f) { resolve([f]); }, function() { resolve([]); });
                });
            } else if (entry.isDirectory) {
                return new Promise(function(resolve) {
                    var reader = entry.createReader();
                    reader.readEntries(async function(entries) {
                        var allFiles = [];
                        for (var e of entries) {
                            var sub = await readEntry(e);
                            allFiles = allFiles.concat(sub);
                        }
                        resolve(allFiles);
                    }, function() { resolve([]); });
                });
            }
            return [];
        }
        
        for (var entry of entries) {
            var found = await readEntry(entry);
            files = files.concat(found);
        }
    } else {
        // Fallback: plain file list
        for (var i = 0; i < e.dataTransfer.files.length; i++) {
            files.push(e.dataTransfer.files[i]);
        }
    }
    
    // Filter to xml/zip files
    var importFiles = files.filter(function(f) {
        var name = f.name.toLowerCase();
        var type = f.type || '';
        return name.endsWith('.xml') || name.endsWith('.zip') || name.endsWith('.xsd') || type.includes('zip');
    });
    
    if (importFiles.length === 0) return;
    
    if (importFiles.length === 1) {
        importDroppedFile(importFiles[0]);
    } else {
        // Multiple files: concatenate XML into one request
        importMultipleFiles(importFiles);
    }
}, true);

async function importMultipleFiles(files) {
    showImportBar('Reading ' + files.length + ' files...');
    try {
        var xmlParts = [];
        var zipFiles = [];
        
        for (var f of files) {
            if (f.name.toLowerCase().endsWith('.zip')) {
                zipFiles.push(f);
            } else if (f.name.toLowerCase().endsWith('.xml')) {
                var text = await f.text();
                // Strip XML declaration and any root wrapper
                text = text.replace(/<\?xml[^?]*\?>/g, '').trim();
                var firstTag = text.match(/^<([A-Za-z_][A-Za-z_0-9]*)[^>]*>/);
                if (firstTag) {
                    text = text.replace(new RegExp('</?(' + firstTag[1] + ')[^>]*>', 'gi'), '').trim();
                }
                xmlParts.push(text);
            }
        }
        
        // Import zips first
        var allResults = [];
        for (var z of zipFiles) {
            showImportBar('Uploading ' + z.name + '...');
            var resp = await fetch(API + '/import-xml', {
                method: 'POST',
                headers: { 'Content-Type': 'application/octet-stream' },
                body: z
            });
            if (resp.ok) {
                var r = await resp.json();
                // Poll for completion
                var finalResult = await pollImportStatus();
                if (finalResult) allResults.push(finalResult);
            }
        }
        
        // Combine all XMLs into one request
        if (xmlParts.length > 0) {
            showImportBar('Uploading ' + xmlParts.length + ' XML files...');
            var combined = '<IMPORT>' + xmlParts.join('\n') + '</IMPORT>';
            var blob = new Blob([combined], { type: 'application/octet-stream' });
            var resp = await fetch(API + '/import-xml', {
                method: 'POST',
                headers: { 'Content-Type': 'application/octet-stream' },
                body: blob
            });
            if (resp.ok) {
                var r = await resp.json();
                var finalResult = await pollImportStatus();
                if (finalResult) allResults.push(finalResult);
            }
        }
        
        hideImportBar();
        sessionStorage.removeItem('ms_schema');
        
        // Merge results
        var total = { success: true, totalRows: 0, tablesProcessed: 0, details: [] };
        for (var r of allResults) {
            if (r.success) {
                total.totalRows += r.totalRows || 0;
                total.tablesProcessed += r.tablesProcessed || 0;
                total.details = total.details.concat(r.details || []);
            }
        }
        
        showImportReport(total);
        loadSchemaFromDB().then(function() { renderContent(); });
    } catch (err) {
        hideImportBar();
        showImportReport({ error: err.message });
    }
}

async function importDroppedFile(file) {
    // ZIP files: unzip on client side via importXmlFile
    if (file.name.toLowerCase().endsWith('.zip')) {
        const fakeInput = { files: [file], value: '' };
        return importXmlFile(fakeInput);
    }
    const sizeMB = (file.size / 1024 / 1024).toFixed(1);
    showImportBar('Reading ' + file.name + ' (' + sizeMB + ' MB)...');
    try {
        // Detect file type: schema XML has <Database>...<Tables> structure
        let endpoint = '/import-xml';
        if (file.name.toLowerCase().endsWith('.xml')) {
            const preview = await file.slice(0, 2000).text();
            if (preview.includes('<Database>') && preview.includes('<Tables>')) {
                endpoint = '/import-schema';
            }
        }
        
        showImportBar('Uploading ' + file.name + '...');
        const resp = await fetch(API + endpoint, {
            method: 'POST',
            headers: { 'Content-Type': 'application/octet-stream' },
            body: file
        });
        const text = await resp.text();
        let startResult;
        try { startResult = JSON.parse(text); } catch(e) {
            hideImportBar();
            showImportReport({ error: 'Server error (HTTP ' + resp.status + '): ' + text.substring(0, 200) });
            return;
        }
        
        // Poll for completion if it's an async import
        let result;
        if (startResult.message && startResult.message.includes('started')) {
            result = await pollImportStatus();
            if (!result) result = { error: 'No result from import' };
        } else {
            result = startResult;
        }
        hideImportBar();
        sessionStorage.removeItem('ms_schema');
        invalidateCdSchema();
        if (result.success) {
            if (result.tablesImported !== undefined) {
                // Schema import report
                const details = [
                    { table: 'cd_tables', rows: result.tablesImported, total: result.tablesImported, errors: 0 },
                    { table: 'cd_fields', rows: result.fieldsImported, total: result.fieldsImported, errors: 0 },
                    { table: 'cd_tabl_fiel', rows: result.linksCreated || 0, total: result.linksCreated || 0, errors: 0 },
                    { table: 'cd_controls', rows: result.controlsCreated || 0, total: result.controlsCreated || 0, errors: 0 },
                    { table: 'cd_fiel_cntr', rows: result.fielCntrCreated || 0, total: result.fielCntrCreated || 0, errors: 0 },
                ];
                if (result.errorList && result.errorList.length > 0) {
                    for (const e of result.errorList) {
                        details.push({ table: '⚠ Error', rows: 0, total: 0, errors: 1, lastError: e });
                    }
                }
                showImportReport({
                    success: true,
                    totalRows: result.tablesImported + result.fieldsImported + (result.linksCreated||0) + (result.controlsCreated||0) + (result.fielCntrCreated||0),
                    tablesProcessed: 5,
                    details,
                    extra: result.breakdown ? 
                        `Database: ${result.database || '?'} — SYS: ${result.breakdown.sys}, User: ${result.breakdown.user}, CD: ${result.breakdown.cd}` +
                        (result.errors > 0 ? ` — ${result.errors} errors` : '') : ''
                });
            } else {
                showImportReport(result);
            }
            loadSchemaFromDB().then(() => renderContent());
        } else {
            showImportReport({ error: result.error });
        }
    } catch (err) {
        hideImportBar();
        showImportReport({ error: err.message });
    }
}

// Import XML data file into CD_ tables
async function importXmlFile(input) {
    const file = input.files[0];
    if (!file) return;
    input.value = '';
    
    const sizeMB = (file.size / 1024 / 1024).toFixed(1);
    showImportBar('Reading ' + file.name + ' (' + sizeMB + ' MB)...');
    
    try {
        const isZip = file.name.toLowerCase().endsWith('.zip');
        let xmlFiles = [];
        
        if (isZip && typeof JSZip !== 'undefined') {
            // Unzip on CLIENT side to avoid server memory issues
            const zip = await JSZip.loadAsync(file);
            const entries = Object.keys(zip.files).filter(n => n.toLowerCase().endsWith('.xml') && !zip.files[n].dir);
            showImportBar('Extracting ' + entries.length + ' XML files from ZIP...');
            for (const name of entries) {
                const content = await zip.files[name].async('string');
                xmlFiles.push({ name, content });
            }
        } else {
            const content = await file.text();
            xmlFiles.push({ name: file.name, content });
        }
        
        // Send each XML separately to keep server memory low
        const allResults = [];
        for (let i = 0; i < xmlFiles.length; i++) {
            const xf = xmlFiles[i];
            showImportBar('Importing ' + (i+1) + '/' + xmlFiles.length + ': ' + xf.name + '...');
            try {
                const resp = await fetch(API + '/import-xml', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/octet-stream' },
                    body: new Blob([xf.content], { type: 'text/xml' })
                });
                const startResult = await resp.json();
                if (startResult.success) {
                    const result = await pollImportStatus();
                    if (result) allResults.push(result);
                } else {
                    allResults.push({ success: false, error: startResult.error, totalRows: 0, tablesProcessed: 0, details: [] });
                }
            } catch(e) {
                allResults.push({ success: false, error: e.message, totalRows: 0, tablesProcessed: 0, details: [] });
            }
        }
        
        hideImportBar();
        const merged = { success: true, totalRows: 0, tablesProcessed: 0, details: [] };
        for (const r of allResults) {
            merged.totalRows += r.totalRows || 0;
            merged.tablesProcessed += r.tablesProcessed || 0;
            merged.details = merged.details.concat(r.details || []);
        }
        sessionStorage.removeItem('ms_schema');
        await loadSchemaFromDB();
        showImportReport(merged);
        renderContent();
    } catch (err) {
        hideImportBar();
        showImportReport({ error: 'Import error: ' + err.message });
    }
}

// Poll /api/import-status until done, returns results or null
async function pollImportStatus() {
    let nullCount = 0;
    for (let i = 0; i < 600; i++) {
        await new Promise(r => setTimeout(r, 1000));
        try {
            const resp = await fetch(API + '/import-status');
            const status = await resp.json();
            if (status.running) {
                nullCount = 0;
                showImportBar(status.progress || 'Importing...');
            } else if (status.results) {
                hideImportBar();
                return status.results;
            } else if (status.error) {
                hideImportBar();
                return { success: false, error: status.error, totalRows: 0, tablesProcessed: 0, details: [] };
            } else {
                // Status is idle (running=false, results=null, error=null)
                // This can happen if we poll before the server starts, or after a crash
                nullCount++;
                if (nullCount > 10) {
                    // After 10 seconds of null status, give up
                    hideImportBar();
                    return { success: false, error: 'Import did not start. Check server logs.', totalRows: 0, tablesProcessed: 0, details: [] };
                }
                showImportBar('Waiting for import to start...');
            }
        } catch(e) { /* retry */ }
    }
    hideImportBar();
    return { success: false, error: 'Timeout after 10 minutes', totalRows: 0, tablesProcessed: 0, details: [] };
}

function showImportReport(result) {
    const popup = document.getElementById('addFieldPopup');
    
    if (result.error) {
        popup.innerHTML = '<div class="add-field-popup" style="max-width:600px;">' +
            '<div class="fe-toolbar"><button class="fe-btn fe-btn-cancel" onclick="closeAddFieldPopup()">Close</button></div>' +
            '<div style="padding:20px;"><h3 style="color:#DC2626;">Import Error</h3><p>' + result.error + '</p></div></div>';
        popup.classList.add('open');
        return;
    }
    
    const details = result.details || [];
    const ok = details.filter(d => d.rows > 0 && !d.errors);
    const partial = details.filter(d => d.rows > 0 && d.errors > 0);
    const failed = details.filter(d => d.rows === 0 && d.errors > 0);
    const notFound = details.filter(d => d.error);
    const empty = details.filter(d => d.rows === 0 && !d.errors && !d.error);
    
    let html = '<div class="add-field-popup" style="max-width:700px;max-height:80vh;overflow-y:auto;">' +
        '<div class="fe-toolbar"><button class="fe-btn fe-btn-ok" onclick="closeAddFieldPopup()">OK</button></div>' +
        '<div style="padding:20px;">' +
        '<h3 style="margin:0 0 12px 0;font-size:18px;">Import Report</h3>' +
        '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px;">' +
            '<div style="background:#ECFDF5;border-radius:8px;padding:12px;text-align:center;"><div style="font-size:24px;font-weight:700;color:#047857;">' + result.totalRows + '</div><div style="font-size:11px;color:#64748B;">Records imported</div></div>' +
            '<div style="background:#EFF6FF;border-radius:8px;padding:12px;text-align:center;"><div style="font-size:24px;font-weight:700;color:#1D4ED8;">' + result.tablesProcessed + '</div><div style="font-size:11px;color:#64748B;">Tables processed</div></div>' +
            '<div style="background:' + (failed.length + partial.length > 0 ? '#FEF2F2' : '#F0FDF4') + ';border-radius:8px;padding:12px;text-align:center;"><div style="font-size:24px;font-weight:700;color:' + (failed.length + partial.length > 0 ? '#DC2626' : '#16A34A') + ';">' + details.reduce((s,d) => s + (d.errors||0), 0) + '</div><div style="font-size:11px;color:#64748B;">Errors</div></div>' +
            '<div style="background:' + (result.verifyErrors > 0 ? '#FEF2F2' : '#F0FDF4') + ';border-radius:8px;padding:12px;text-align:center;"><div style="font-size:24px;font-weight:700;color:' + (result.verifyErrors > 0 ? '#DC2626' : '#16A34A') + ';">' + (result.verifyErrors || 0) + '</div><div style="font-size:11px;color:#64748B;">Verify fails</div></div>' +
        '</div>';
    
    // Table details
    if (result.extra) {
        html += '<div style="padding:6px 12px;margin-bottom:8px;background:#F8FAFC;border-radius:6px;font-size:12px;color:#475569;">' + result.extra + '</div>';
    }
    html += '<table style="width:100%;border-collapse:collapse;font-size:13px;">' +
        '<thead><tr style="background:#F8FAFC;"><th style="text-align:left;padding:6px 8px;border-bottom:1px solid #E2E8F0;">Table</th>' +
        '<th style="text-align:right;padding:6px 8px;border-bottom:1px solid #E2E8F0;">Records</th>' +
        '<th style="text-align:right;padding:6px 8px;border-bottom:1px solid #E2E8F0;">Errors</th>' +
        '<th style="text-align:left;padding:6px 8px;border-bottom:1px solid #E2E8F0;">Status</th></tr></thead><tbody>';
    
    for (const d of details) {
        const verifyOk = d.verified !== false;
        const status = d.error ? '⚠️ ' + d.error :
                       d.errors > 0 && d.rows === 0 ? '❌ Failed' :
                       d.errors > 0 ? '⚠️ Partial' :
                       !verifyOk ? '❌ ' + (d.verifyError || 'Count mismatch') :
                       d.rows > 0 ? '✓ OK' : '— Empty';
        const color = (d.error || (d.errors > 0 && d.rows === 0) || !verifyOk) ? '#FEF2F2' :
                      d.errors > 0 ? '#FFFBEB' : '';
        const errDetail = d.lastError ? '<div style="font-size:11px;color:#94A3B8;margin-top:2px;">' + d.lastError.substring(0,80) + '</div>' : '';
        
        html += '<tr style="background:' + color + ';">' +
            '<td style="padding:5px 8px;border-bottom:1px solid #F1F5F9;">' + d.table + errDetail + '</td>' +
            '<td style="padding:5px 8px;border-bottom:1px solid #F1F5F9;text-align:right;">' + d.rows + '/' + d.total + '</td>' +
            '<td style="padding:5px 8px;border-bottom:1px solid #F1F5F9;text-align:right;color:#DC2626;">' + (d.errors || 0) + '</td>' +
            '<td style="padding:5px 8px;border-bottom:1px solid #F1F5F9;">' + status + '</td></tr>';
    }
    
    html += '</tbody></table></div></div>';
    popup.innerHTML = html;
    popup.classList.add('open');
}

// Seed all XSD dictionary data into Neon cloud database
async function seedDictionary() {
    // Parse xsdFieldData into structured format with types
    const typeMap = { i: 'int', s: 'string', b: 'boolean', d: 'dateTime', u: 'string', y: 'base64Binary' };
    const pgMap = { i: 'integer', s: 'varchar(255)', b: 'boolean', d: 'timestamptz', u: 'varchar(255)', y: 'bytea' };
    
    // Classify tables
    const seedTables = {};
    const seen = new Set();
    
    for (const [tableName, fieldStr] of Object.entries(xsdFieldData)) {
        const upper = tableName.toUpperCase();
        if (seen.has(upper) || upper === 'CD_VERSPANING') continue;
        seen.add(upper);
        
        // Only CD_ tables for dictionary
        if (!upper.startsWith('CD_')) continue;
        
        // Determine type
        let fType = 1;
        if (upper.startsWith('CD_LK_')) fType = 2;
        else if (upper.match(/_(?:EXECUTION_LOG|LOGS|REMOTE|CHECKLIST|CLUSTERSETTINGS|FIELDKEY|FIELDVALUE|KINDS|LINKEDITORVISIBILITY|MATCH|TABSETTINGS|FILTERINGSETTINGS|RESTRICTIONS)$/)) fType = 4;
        else if (upper.match(/^CD_[A-Z]{4}_[A-Z]{4}$/) && !upper.startsWith('CD_LK_')) fType = 3;
        
        // Parse fields
        const fields = [];
        const seenFields = new Set();
        for (const fdef of fieldStr.split(',')) {
            const parts = fdef.trim().split(':');
            if (parts.length < 2) continue;
            const fname = parts[0].trim().toUpperCase();
            const ftype = parts[1].trim();
            if (!fname || seenFields.has(fname)) continue;
            seenFields.add(fname);
            fields.push({ name: fname, pgType: pgMap[ftype] || 'varchar(255)', xsType: typeMap[ftype] || 'string' });
        }
        
        seedTables[upper] = { fType, fields };
    }
    
    // Sort: lookups first, then entities, subs, links
    const ordered = {};
    const order = [2, 1, 4, 3]; // lookup, entity, sub, link
    for (const ft of order) {
        for (const [name, info] of Object.entries(seedTables)) {
            if (info.fType === ft && !ordered[name]) ordered[name] = info;
        }
    }
    
    const count = Object.keys(ordered).length;
    if (!confirm('Import ' + count + ' CD_ tables into dictionary?\n\nExisting dictionary data will be replaced.\n\nContinue?')) return;
    
    showLoading('Seeding ' + count + ' CD_ tables to Neon...');
    
    try {
        const resp = await fetch(API + '/seed-xsd', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ tables: ordered })
        });
        const result = await resp.json();
        hideLoading();
        if (result.success) {
            const s = result.summary || {};
            alert('✓ Dictionary imported!\n\nTables: ' + result.tables + '\nFields: ' + result.fields + '\n\nLookups: ' + (s.lookups||0) + '\nEntities: ' + (s.entities||0) + '\nSubtables: ' + (s.subtables||0) + '\nLinks: ' + (s.links||0));
            renderContent();
        } else {
            alert('Error: ' + result.error);
        }
    } catch (err) {
        hideLoading();
        alert('Error: ' + err.message);
    }
}

async function saveNewTable() {
    const name = document.getElementById('newTableName').value.trim();
    const type = document.getElementById('newTableType').value;
    const extraFields = document.getElementById('newTableFields').value.trim();
    
    if (!name) { alert('Table name is required'); return; }
    
    const tableName = name.toLowerCase().replace(/[^a-z0-9_]/g, '');
    const keyName = 'k_' + tableName.replace(/^cd_/, '').replace(/^sys_/, '');
    
    // Build columns
    const columns = [
        { name: keyName, type: 'SERIAL', pk: true },
        { name: 'name', type: 'varchar(100)' }
    ];
    
    // Add extra fields
    if (extraFields) {
        for (const f of extraFields.split(',')) {
            const fn = f.trim().toLowerCase().replace(/[^a-z0-9_]/g, '');
            if (fn) columns.push({ name: fn, type: 'varchar(100)' });
        }
    }
    
    // Standard footer fields
    columns.push(
        { name: 'createdby', type: 'integer' },
        { name: 'createdate', type: 'timestamptz', default: 'now()' },
        { name: 'changedby', type: 'integer' },
        { name: 'changedate', type: 'timestamptz', default: 'now()' }
    );
    
    try {
        // Create physical table in Neon
        const resp = await fetch(API + '/schema/tables', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name: tableName, columns })
        });
        const result = await resp.json();
        
        if (result.success) {
            // Also register in cd_tables if it's a CD_ table
            if (tableName.startsWith('cd_')) {
                await fetch(API + '/data/cd_tables', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        k_table: Math.floor(Math.random() * 90000) + 10000,
                        name: name.toUpperCase(), 
                        f_type: type === 'entity' ? 1 : (type === 'lookup' ? 2 : (type === 'link' ? 3 : 4)),
                        sort: 999
                    })
                });
            }
            
            closeAddFieldPopup();
            alert('✓ Table "' + tableName + '" created with ' + columns.length + ' columns!');
            renderContent();
        } else {
            alert('Error: ' + result.error);
        }
    } catch (err) {
        alert('Error: ' + err.message);
    }
}

async function ssDoSearch() {
    const query = document.getElementById('ssInput').value.trim();
    const resultsEl = document.getElementById('ssResults');
    const infoEl = document.getElementById('ssInfo');
    const pagerEl = document.getElementById('ssPager');
    
    if (_ssMode === 'entity') {
        ssEntitySearch(query);
        return;
    }
    
    // Record search mode
    if (!query) {
        resultsEl.innerHTML = '';
        infoEl.innerHTML = 'Type to search across all fields';
        pagerEl.innerHTML = '';
        return;
    }
    
    resultsEl.innerHTML = '<div style="padding:30px;text-align:center;color:#94A3B8;"><div class="loading-spinner" style="width:20px;height:20px;margin:0 auto 8px;border-width:2px;"></div>Searching...</div>';
    
    try {
        const offset = _ssPage * _ssPageSize;
        const res = await fetch(API + '/raw/' + encodeURIComponent(_ssTable.toLowerCase()) + 
            '?limit=' + _ssPageSize + '&offset=' + offset + '&search=' + encodeURIComponent(query));
        if (!res.ok) throw new Error('API error ' + res.status);
        const data = await res.json();
        const rows = data.rows || [];
        const total = data.total || 0;
        
        infoEl.innerHTML = `<span>${total} result${total !== 1 ? 's' : ''} for "<strong>${query}</strong>"</span><span>${total > 0 ? (offset+1) + '–' + Math.min(offset+_ssPageSize, total) + ' of ' + total : ''}</span>`;
        
        if (rows.length === 0) {
            resultsEl.innerHTML = '<div style="padding:40px;text-align:center;color:#94A3B8;">No records found</div>';
            pagerEl.innerHTML = '';
            return;
        }
        
        const allCols = Object.keys(rows[0]);
        const skipCols = new Set();
        for (const col of allCols) {
            const cl = col.toLowerCase();
            if (cl === 'replicationid' || cl.startsWith('memo_') || cl === 'graphical') skipCols.add(col);
            if (rows.every(r => r[col] === null || (typeof r[col] === 'object' && r[col] !== null))) skipCols.add(col);
        }
        const showCols = allCols.filter(c => !skipCols.has(c));
        const pkCol = allCols.find(c => c.toLowerCase().startsWith('k_')) || allCols[0];
        
        let html = '';
        // Store rows for callback
        window._ssRows = rows;
        for (let ri = 0; ri < rows.length; ri++) {
            const row = rows[ri];
            html += `<div class="ss-row" onclick="ssSelectRecord(${ri})">`;
            html += `<span class="ss-row-pk">#${row[pkCol] || '?'}</span>`;
            html += `<div class="ss-row-fields">`;
            for (const col of showCols) {
                if (col === pkCol) continue;
                let val = row[col];
                if (val === null || val === undefined || val === '') continue;
                val = String(val);
                if (val.length > 80) val = val.substring(0, 77) + '...';
                html += `<span class="ss-row-field"><span class="ss-row-label">${col}:</span> <span class="ss-row-value">${ssHighlight(val, query)}</span></span>`;
            }
            html += `</div></div>`;
        }
        resultsEl.innerHTML = html;
        ssRenderPager(data.total || 0, pagerEl);
    } catch(e) {
        resultsEl.innerHTML = '<div style="padding:20px;color:#EF4444;">Error: ' + e.message + '</div>';
    }
}

function ssEntitySearch(query) {
    const resultsEl = document.getElementById('ssResults');
    const infoEl = document.getElementById('ssInfo');
    const pagerEl = document.getElementById('ssPager');
    pagerEl.innerHTML = '';
    
    // Get all entities from schema
    const schema = window._schemaFull || {};
    const allTables = Object.keys(schema).map(t => t.toUpperCase()).sort();
    
    // Filter by query
    const q = query.toLowerCase();
    const matches = q ? allTables.filter(t => t.toLowerCase().includes(q)) : allTables;
    
    infoEl.innerHTML = `<span>${matches.length} entit${matches.length !== 1 ? 'ies' : 'y'}${q ? ' matching "' + query + '"' : ''}</span>`;
    
    if (matches.length === 0) {
        resultsEl.innerHTML = '<div style="padding:40px;text-align:center;color:#94A3B8;">No entities found</div>';
        return;
    }
    
    let html = '';
    for (const t of matches.slice(0, 50)) {
        const isCd = t.startsWith('CD_');
        const isSys = t.startsWith('SYS_');
        const isLk = t.includes('LK_');
        let badge = '', color = '#64748B';
        if (isCd) { badge = 'CD'; color = '#3B82F6'; }
        else if (isSys) { badge = 'SYS'; color = '#F59E0B'; }
        else { badge = 'USR'; color = '#22C55E'; }
        if (isLk) badge += '/LK';
        
        const icon = userIconMap[t] || cdIconMap[t.replace('CD_','')] || 'table';
        
        html += `<div class="ss-row" onclick="ssSelectEntity('${t}')">
            <span style="min-width:50px;"><span style="background:${color}18;color:${color};padding:2px 6px;border-radius:4px;font-size:10px;font-weight:600;">${badge}</span></span>
            <i data-lucide="${icon}" style="width:16px;height:16px;color:${color};flex-shrink:0;"></i>
            <span style="font-weight:600;color:#0F172A;">${q ? ssHighlight(t, query) : t}</span>
        </div>`;
    }
    if (matches.length > 50) html += '<div style="padding:8px 20px;color:#94A3B8;font-size:11px;">Showing first 50 of ' + matches.length + '...</div>';
    resultsEl.innerHTML = html;
    lucide.createIcons();
}

function ssSelectEntity(entityName) {
    document.getElementById('searchScreenOverlay').remove();
    
    if (_ssCallback) { _ssCallback({ name: entityName }); return; }
    
    // Default: load in form designer
    fdCurrentEntity = entityName;
    sessionStorage.setItem('fd_entity', entityName);
    if (activeItem === 'form_designer') {
        fdLoadEntity();
    } else {
        activeItem = 'form_designer';
        sessionStorage.setItem('ms_activeItem', activeItem);
        renderContent();
    }
}

function ssSelectRecord(index) {
    const row = window._ssRows && window._ssRows[index];
    if (!row) return;
    document.getElementById('searchScreenOverlay').remove();
    
    if (_ssCallback) { _ssCallback(row); return; }
}

function ssRenderPager(total, pagerEl) {
    const totalPages = Math.ceil(total / _ssPageSize);
    if (totalPages <= 1) { pagerEl.innerHTML = ''; return; }
    
    let p = '';
    const btnS = 'padding:4px 8px;font-size:11px;cursor:pointer;border:1px solid #E2E8F0;border-radius:4px;background:#fff;';
    const actS = 'padding:4px 8px;font-size:11px;border:1px solid #3B82F6;border-radius:4px;background:#3B82F6;color:#fff;';
    const disS = 'padding:4px 8px;font-size:11px;border:1px solid #E2E8F0;border-radius:4px;background:#F8FAFC;color:#CBD5E1;';
    
    p += `<button style="${_ssPage===0?disS:btnS}" ${_ssPage===0?'disabled':''} onclick="_ssPage=0;ssDoSearch();">◀◀</button>`;
    p += `<button style="${_ssPage===0?disS:btnS}" ${_ssPage===0?'disabled':''} onclick="_ssPage=Math.max(0,_ssPage-1);ssDoSearch();">◀</button>`;
    const pages = [];
    for (let i=0;i<totalPages;i++){if(i===0||i===totalPages-1||(i>=_ssPage-2&&i<=_ssPage+2))pages.push(i);else if(pages.length>0&&pages[pages.length-1]!==-1)pages.push(-1);}
    for(const pg of pages){if(pg===-1)p+='<span style="color:#94A3B8;">…</span>';else p+=`<button style="${pg===_ssPage?actS:btnS}" onclick="_ssPage=${pg};ssDoSearch();">${pg+1}</button>`;}
    p += `<button style="${_ssPage>=totalPages-1?disS:btnS}" ${_ssPage>=totalPages-1?'disabled':''} onclick="_ssPage=Math.min(${totalPages-1},_ssPage+1);ssDoSearch();">▶</button>`;
    p += `<button style="${_ssPage>=totalPages-1?disS:btnS}" ${_ssPage>=totalPages-1?'disabled':''} onclick="_ssPage=${totalPages-1};ssDoSearch();">▶▶</button>`;
    pagerEl.innerHTML = p;
}

function ssHighlight(text, query) {
    if (!query) return text;
    text = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    const words = query.split(/\s+/).filter(w => w.length > 0);
    for (const word of words) {
        const escaped = word.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        text = text.replace(new RegExp('(' + escaped + ')', 'gi'), '<span class="ss-highlight">$1</span>');
    }
    return text;
}

    cards.forEach(card => {
        const name = card.getAttribute('data-name');
        card.style.display = name.includes(query) ? '' : 'none';
    });
}

function fdLoadEntity() {
    if (!fdCurrentEntity) return;
    const entityName = fdCurrentEntity;
    document.getElementById('fdEntityName').textContent = entityName;
    
    // Build toolbox
    fdRenderToolbox(entityName);

}

function fdGetFieldType(fieldName) {
    const fn = fieldName.toUpperCase();
    if (fn.startsWith('K_')) return 'pkey';
    if (fn.startsWith('F_') || fn === 'CREATEDBY' || fn === 'CHANGEDBY') return 'lookup';
    if (fn === 'MEMO' || fn.startsWith('MEMO_')) return 'memo';
    if (fn === 'IMAGE' || fn === 'LOGO' || fn === 'PICTURE' || fn === 'GRAPHICAL') return 'image';
    if (fn === 'CREATEDATE' || fn === 'CHANGEDATE' || fn === 'LASTSTATUSDATE' || fn === 'LIFEDATE') return 'datetime';
    if (fn.startsWith('IS_') || fn === 'MAIN' || fn === 'ENABLED') return 'bool';
    return 'text';
}

function fdGetFieldIcon(type) {
    const icons = { pkey: '🔑', lookup: '🔍', text: '𝐓↕', image: '🖼', datetime: '📅', memo: '📝', bool: '☑', other: '■' };
    return icons[type] || '■';
}

function fdRenderToolbox(entityName) {
    const schema = window._schemaFull || {};
    const entityInfo = schema[entityName.toLowerCase()];
    const cols = entityInfo ? (entityInfo.columns || []) : [];
    
    // Sort fields by sort column if available, else by position
    const sortedCols = [...cols].sort((a, b) => (a.ordinal_position || 0) - (b.ordinal_position || 0));
    
    // Find linked entities via relations
    const userRels = getUserRelations();
    const cdRels = getCdRelations();
    const rels = { ...cdRels, ...userRels };
    
    // Find subtables
    const allSubs = { ...getCdSubTables(), ...getUserSubTables() };
    const entitySubs = allSubs[entityName] || [];
    
    // Find linked entities (where this entity has n, — or nn relations)
    const linkedEntities = [];
    const entityRels = rels[entityName] || {};
    for (const [targetEntity, relType] of Object.entries(entityRels)) {
        if (targetEntity === entityName) continue;
        let label = relType === 'n' ? '1:n' : (relType === '—' ? 'n:1' : relType);
        linkedEntities.push({ name: targetEntity, label });
    }
    
    let html = '';
    
    // Subject entity
    html += `<div class="fd-entity-header" onclick="fdToggleFields(this)">
        <i data-lucide="${userIconMap[entityName] || cdIconMap[entityName.replace('CD_','')] || 'table'}" style="width:14px;height:14px;"></i>
        <span style="flex:1;overflow:hidden;text-overflow:ellipsis;">${entityName}</span>
        <span class="fd-entity-label">Subject 1:1</span>
    </div>`;
    html += `<div class="fd-fields-list" id="fdFields_subject">`;
    for (const col of sortedCols) {
        const ft = fdGetFieldType(col.name);
        html += `<div class="fd-field ${ft}" draggable="true" title="${col.name}">${fdGetFieldIcon(ft)} ${col.name}</div>`;
    }
    html += `</div>`;
    
    // Subtables
    for (const sub of entitySubs) {
        html += `<div class="fd-entity-header" onclick="fdToggleFields(this)" style="margin-top:4px;">
            <span style="flex:1;overflow:hidden;text-overflow:ellipsis;font-size:11px;">${sub.length > 18 ? sub.substring(0,16)+'...' : sub}</span>
            <span style="cursor:pointer;color:#94A3B8;font-size:10px;">✏</span>
        </div>`;
        const subInfo = schema[sub.toLowerCase()];
        if (subInfo) {
            html += `<div class="fd-fields-list collapsed">`;
            for (const sc of (subInfo.columns || [])) {
                const ft = fdGetFieldType(sc.name);
                html += `<div class="fd-field ${ft}" draggable="true" title="${sub}.${sc.name}">${fdGetFieldIcon(ft)} ${sc.name}</div>`;
            }
            html += `</div>`;
        }
    }
    
    // Linked entities
    for (const le of linkedEntities.sort((a,b) => a.name.localeCompare(b.name))) {
        const leInfo = schema[le.name.toLowerCase()];
        const leCols = leInfo ? (leInfo.columns || []) : [];
        html += `<div class="fd-entity-header" onclick="fdToggleFields(this)" style="margin-top:4px;">
            <i data-lucide="${userIconMap[le.name] || cdIconMap[le.name.replace('CD_','')] || 'table'}" style="width:12px;height:12px;"></i>
            <span style="flex:1;overflow:hidden;text-overflow:ellipsis;">${le.name}</span>
            <span class="fd-entity-label">${le.label}</span>
        </div>`;
        html += `<div class="fd-fields-list collapsed">`;
        for (const lc of leCols) {
            const ft = fdGetFieldType(lc.name);
            html += `<div class="fd-field ${ft}" draggable="true" title="${le.name}.${lc.name}">${fdGetFieldIcon(ft)} ${lc.name}</div>`;
        }
        html += `</div>`;
    }
    
    document.getElementById('fdToolboxContent').innerHTML = html;
    lucide.createIcons();
}

function fdToggleFields(headerEl) {
    const fieldsList = headerEl.nextElementSibling;
    if (fieldsList && fieldsList.classList.contains('fd-fields-list')) {
        fieldsList.classList.toggle('collapsed');
    }
}

async function fdLoadTypes(entityName) {
    // Load types from cd_types where f_table = k_table of this entity
    try {
        const res = await fetch(API + '/entity-types/' + encodeURIComponent(entityName));
        if (!res.ok) return;
        const data = await res.json();
        const types = data.types || [];
        const sel = document.getElementById('fdTypeSelect');
        if (sel) {
            sel.innerHTML = '<option value="-">- (default)</option>';
            for (const t of types) {
                const label = t.name || ('Type ' + t.k_type);
                sel.innerHTML += `<option value="${t.k_type}" ${t.default ? 'selected' : ''}>${label}</option>`;
            }
        }
        // Store for later use
        window._fdEntityTypes = types;
    } catch(e) { /* ignore */ }
}

function fdRenderPreview() {
    const entityName = fdCurrentEntity;
    if (!entityName) return;
    
    const schema = window._schemaFull || {};
    const entityInfo = schema[entityName.toLowerCase()];
    const cols = entityInfo ? (entityInfo.columns || []) : [];
    
    // Find linked entities for tabs
    const userRels = getUserRelations();
    const cdRels = getCdRelations();
    const rels = { ...cdRels, ...userRels };
    const entityRels = rels[entityName] || {};
    const allSubs = { ...getCdSubTables(), ...getUserSubTables() };
    const entitySubs = allSubs[entityName] || [];
    
    const tabEntities = [];
    for (const [target, relType] of Object.entries(entityRels)) {
        if (target !== entityName) tabEntities.push(target);
    }
    tabEntities.sort();
    
    // Separate fields into header groups
    const nameFields = cols.filter(c => ['NAME','ALIAS'].includes(c.name.toUpperCase()) || c.name.toUpperCase().startsWith('NAME_'));
    const contactFields = cols.filter(c => ['PHONE','FAX','EMAIL','WEBSITE'].includes(c.name.toUpperCase()));
    const otherHeader = cols.filter(c => {
        const u = c.name.toUpperCase();
        return !u.startsWith('K_') && !u.startsWith('F_') && !u.startsWith('MEMO') && 
               !['NAME','ALIAS','PHONE','FAX','EMAIL','WEBSITE','CREATEDATE','CHANGEDATE','CREATEDBY','CHANGEDBY','LASTSTATUSDATE','REPLICATIONID','GRAPHICAL','IMAGE','LOGO','PICTURE'].includes(u) &&
               !u.startsWith('NAME_') && !u.startsWith('IS_');
    });
    
    // Build toolbar
    let html = `<div class="fd-toolbar">
        <input type="text" placeholder="Search forms..." style="padding:4px 8px;border:1px solid #D1D5DB;border-radius:4px;font-size:12px;width:120px;cursor:pointer;" readonly onclick="openSearchScreen('cd_forms', ssFormCallback)">
        <span style="cursor:pointer;color:#F59E0B;">★</span>
        <button class="fd-toolbar-btn green">⊕ Add</button>
        <button class="fd-toolbar-btn blue">✏ Edit</button>
        <button class="fd-toolbar-btn red">🗑 Delete</button>
        <button class="fd-toolbar-btn">≡ List</button>
        <button class="fd-toolbar-btn orange">↺ History</button>
        <div style="margin-left:auto;font-size:32px;color:#E2E8F0;">
            <i data-lucide="${userIconMap[entityName] || 'building-2'}" style="width:48px;height:48px;color:#E2E8F0;"></i>
        </div>
    </div>`;
    
    // Three-column header area
    html += `<div class="fd-header-area" style="position:relative;">`;
    
    // Left column: avatar + name fields
    html += `<div class="fd-header-col">
        <div style="width:80px;height:80px;background:#F1F5F9;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#CBD5E1;font-size:24px;">👤</div>`;
    for (const f of nameFields.slice(0, 3)) {
        html += `<div class="fd-header-field"><input placeholder="${f.name}" readonly></div>`;
    }
    html += `</div>`;
    
    // Middle column: contact fields
    html += `<div class="fd-header-col">`;
    for (const f of contactFields) {
        html += `<div class="fd-header-field"><label>${f.name}</label><input placeholder="${f.name}" readonly></div>`;
    }
    html += `</div>`;
    
    // Right column: other fields
    html += `<div class="fd-header-col">`;
    for (const f of otherHeader.slice(0, 4)) {
        html += `<div class="fd-header-field"><label>${f.name}</label><input placeholder="${f.name}" readonly></div>`;
    }
    html += `</div>`;
    html += `</div>`;
    
    // Tabs
    const allTabs = [...entitySubs.map(s => ({ name: s, type: 'sub' })), ...tabEntities.map(e => ({ name: e, type: 'link' }))];
    html += `<div class="fd-tabs">`;
    for (let i = 0; i < allTabs.length; i++) {
        const tab = allTabs[i];
        const displayName = tab.name.replace(entityName + '$', '').replace(entityName + '_', '');
        html += `<div class="fd-tab ${i === fdActiveTab ? 'active' : ''}" onclick="fdActiveTab=${i};fdRenderPreview();">${displayName}</div>`;
    }
    html += `<div class="fd-tab" style="color:#CBD5E1;">+</div>`;
    html += `</div>`;
    
    // Tab content: show fields of active tab's entity
    html += `<div class="fd-tab-content">`;
    if (allTabs.length > 0 && fdActiveTab < allTabs.length) {
        const activeTabEntity = allTabs[fdActiveTab];
        const tabInfo = schema[activeTabEntity.name.toLowerCase()];
        const tabCols = tabInfo ? (tabInfo.columns || []) : [];
        
        for (const tc of tabCols) {
            if (tc.name.toUpperCase().startsWith('K_') || tc.name.toUpperCase() === 'REPLICATIONID') continue;
            html += `<div class="fd-tab-row">${activeTabEntity.name}.${tc.name}</div>`;
        }
    }
    html += `</div>`;
    
    document.getElementById('fdPreview').innerHTML = html;
    lucide.createIcons();
}

        if (expand) expand.textContent = children.classList.contains('open') ? '−' : '+';

function selectLookupTable(tableName) {
    activeLookupTable = tableName;

    // Highlight in tree
    document.querySelectorAll('.le-tree-lookup').forEach(el => el.classList.remove('active'));
    const activeEl = document.querySelector(`.le-tree-lookup[data-table="${tableName}"]`);
    if (activeEl) {
        activeEl.classList.add('active');
        // Expand parent
        const parent = activeEl.parentElement;
        if (parent && !parent.classList.contains('open')) {
            parent.classList.add('open');
            const expand = parent.previousElementSibling?.querySelector('.le-expand');
            if (expand) expand.textContent = '−';
        }
    }

    // Derive PK column name: CD_LK_KINDS→K_KIND, CD_LK_FORMATS→K_FORMAT, CD_LK_MATCH_MODES→K_MATCH_MODE
    const lkSuffix = tableName.replace('CD_LK_','');
    // Remove trailing S for singular, handle special cases
    let singular = lkSuffix;
    if (singular.endsWith('IES')) singular = singular.slice(0,-3) + 'Y';
    else if (singular.endsWith('SSES')) singular = singular.slice(0,-2);

        <div class="sub-dd-item" onclick="document.getElementById('subDropdown').remove();openNewSubDialog('${tableName}')" style="padding:8px 14px;font-size:13px;color:#3B82F6;cursor:pointer;font-weight:600;display:flex;align-items:center;gap:8px;"
